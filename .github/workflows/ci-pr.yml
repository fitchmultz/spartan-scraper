name: ci-pr

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-pr:
    name: PR Required Checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: "1"
      CI_VITEST_MAX_WORKERS: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.28.0"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: "pnpm"
          cache-dependency-path: |
            web/pnpm-lock.yaml
            extensions/pnpm-lock.yaml

      - name: Run deterministic PR gate
        run: make ci-pr
