name: ci-slow

on:
  schedule:
    # Nightly at 09:00 UTC (01:00 PST / 02:00 PDT)
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: ci-slow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci-slow:
    name: Nightly / Manual Deterministic Heavy Checks
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CI: "1"
      CI_VITEST_MAX_WORKERS: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read toolchain contract
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail
          go_version=$(awk '$1=="golang" { print $2 }' .tool-versions)
          node_version=$(awk '$1=="nodejs" { print $2 }' .tool-versions)
          pnpm_version=$(awk '$1=="pnpm" { print $2 }' .tool-versions)

          if [[ -z "$go_version" || -z "$node_version" || -z "$pnpm_version" ]]; then
            echo "Failed to parse .tool-versions" >&2
            exit 1
          fi

          {
            echo "go=$go_version"
            echo "node=$node_version"
            echo "pnpm=$pnpm_version"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.toolchain.outputs.go }}
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ steps.toolchain.outputs.pnpm }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.toolchain.outputs.node }}
          cache: "pnpm"
          cache-dependency-path: |
            web/pnpm-lock.yaml
            tools/pi-bridge/pnpm-lock.yaml

      - name: Assert toolchain contract
        run: make verify-toolchain

      - name: Run heavy profile
        run: make ci-slow
