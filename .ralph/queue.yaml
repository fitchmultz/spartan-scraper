- id: RQ-0013
  status: todo
  title: Fix deadlock risk in crawl concurrency
  tags:
  - bug
  - reliability
  - concurrency
  scope:
  - internal/crawl/crawl.go
  evidence:
  - |-
    crawl.go uses goroutines with channels and WaitGroup but has complex
    interaction between visited map mutex and task/channel operations. Lines 282-361
    have potential for goroutine to block on full channel while holding lock or for
    deadlock if context is cancelled prematurely.
  plan:
  - Review and simplify goroutine coordination in crawl.Run()
  - Ensure consistent lock ordering to prevent deadlock
  - Add context cancellation checks before blocking operations
  - Add timeouts to channel operations
  - Add unit tests for concurrent edge cases
  - Consider using worker pool pattern instead of manual goroutines
  notes: []
  request: scan finding
  created_at: 2025-01-18T21:30:00Z
  updated_at: 2025-01-18T21:30:00Z
- id: RQ-0014
  status: todo
  title: Add pagination and filtering to jobs API
  tags:
  - api
  - performance
  - ux
  scope:
  - internal/api/server.go
  - internal/store/store.go
  - api/openapi.yaml
  evidence:
  - |-
    api/server.go handleJobs() returns all jobs with no pagination. store/store.go
    List() has no LIMIT/OFFSET. Large job tables will cause slow responses and
    memory issues.
  plan:
  - Add pagination params (page, limit) to GET /v1/jobs
  - Add filtering params (status, kind, date range) to GET /v1/jobs
  - Update store/store.go List() to support pagination and filtering
  - Add total_count to job list response
  - Add sort order parameter (created_at desc default)
  - Update OpenAPI spec with new query parameters
  notes: []
  request: scan finding
  created_at: 2025-01-18T21:30:00Z
  updated_at: 2025-01-18T21:30:00Z
- id: RQ-0015
  status: todo
  title: Add retry jitter to prevent thundering herd
  tags:
  - performance
  - reliability
  - network
  scope:
  - internal/fetch/retry.go
  - internal/fetch/http_fetcher.go
  evidence:
  - |-
    fetch/http_fetcher.go backoff() on line 120 uses deterministic delay
    (base * 2^attempt). Multiple concurrent retries will align and overwhelm target
    servers.
  plan:
  - Add random jitter to backoff calculation (e.g., ±25%)
  - Use crypto/rand or math/rand for jitter generation
  - Update tests to verify jitter adds randomness
  - Document backoff strategy in code comments
  - Consider implementing exponential backoff with jitter library
  notes: []
  request: scan finding
  created_at: 2025-01-18T21:30:00Z
  updated_at: 2025-01-18T21:30:00Z
- id: RQ-0016
  status: todo
  title: Add indexes to SQLite database
  tags:
  - performance
  - database
  scope:
  - internal/store/store.go
  evidence:
  - |-
    store/store.go init() creates tables but no indexes on jobs table (status,
    kind, created_at) or crawl_states table. Queries filtering or sorting by these
    fields will be slow at scale.
  plan:
  - Add index on jobs(status) for filtering by status
  - Add index on jobs(kind, created_at) for listing jobs by type and date
  - Add index on jobs(created_at) for ordering and time-based queries
  - Add index on crawl_states(last_scraped) for incremental cleanup
  - Add database migration system for schema changes
  - Update init() to create indexes idempotently
  notes: []
  request: scan finding
  created_at: 2025-01-18T21:30:00Z
  updated_at: 2025-01-18T21:30:00Z
- id: RQ-0017
  status: todo
  title: Extract hardcoded values to configuration
  tags:
  - maintainability
  - configuration
  scope:
  - internal/jobs/manager.go
  - internal/crawl/crawl.go
  - internal/fetch
  evidence:
  - |-
    Multiple magic numbers:
    jobs/manager.go:50 queue size 128 hardcoded
    crawl.go:63, 64 default values for MaxPages (100) and Concurrency (4)
    fetch/http_fetcher.go:26 default base delay 300ms
    These should be configurable via config or environment variables.
  plan:
  - Add queue size to config.Config (JOB_QUEUE_SIZE, default 128)
  - Add crawl defaults to config (CRAWL_MAX_PAGES, CRAWL_CONCURRENCY)
  - Add retry defaults to config (RETRY_BASE_MS default in config.go already exists but not used in http_fetcher.go)
  - Update internal/fetch/http_fetcher.go to use config value
  - Document all new config options in .env.example and README
  notes: []
  request: scan finding
  created_at: 2025-01-18T21:30:00Z
  updated_at: 2025-01-18T21:30:00Z
