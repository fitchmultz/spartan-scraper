  - id: 2
    status: todo
    title: Add structured logging throughout Go codebase
    tags:
      - logging
      - observability
      - debugging
    scope:
      - internal/cli
      - internal/scrape
      - internal/crawl
      - internal/jobs
      - internal/fetch
    evidence:
      No structured logging found in scrape.go, crawl.go, or jobs/manager.go.
      Errors are only returned or written to stderr. This makes debugging production issues
      very difficult.
    plan:
      - Add slog or similar structured logger package to Go modules
      - Add log fields for job ID, URL, status at key points in jobs/manager.go
      - Add logging for scrape and crawl operations with progress indicators
      - Add request ID generation and propagation through the pipeline
      - Configure log levels and output format via environment variables
