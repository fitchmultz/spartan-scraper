  - id: 3
    status: todo
    title: Add graceful shutdown for server and workers
    tags:
      - reliability
      - infrastructure
      - shutdown
    scope:
      - internal/cli
      - internal/jobs
      - internal/api
    evidence:
      internal/cli/cli.go runServer() starts HTTP server and scheduler goroutines
      but has no signal handling. internal/jobs/manager.go starts worker goroutines with no
      shutdown mechanism. This will cause abrupt termination on SIGTERM/SIGINT.
    plan:
      - Add context cancellation to jobs/manager.go Start() method
      - Add signal handling (SIGTERM, SIGINT) to runServer() in cli.go
      - Wait for in-flight jobs to complete before shutdown
      - Add graceful timeout for shutdown (e.g., 30 seconds)
      - Update manager to drain job queue before stopping workers
      - Add shutdown logging and status reporting
    request: scan finding
    created_at: 2025-01-18T21:30:00Z
    updated_at: 2025-01-18T21:30:00Z
  - id: 4
    status: todo
    title: Fix silent error handling throughout codebase
    tags:
      - error-handling
      - reliability
      - bug
    scope:
      - internal/scrape/scrape.go
      - internal/crawl/crawl.go
      - internal/jobs/manager.go
      - internal/store/store.go
    evidence: |
      Multiple instances of errors being swallowed with `_`:
      scrape.go:158, 172, 202, 222, 257
      crawl.go:202, 255
      jobs/manager.go:213, 214, 217, 251, 252, 253, 254, 293, 294, 296, 297, 303
      store/store.go:64, 76, 99, 102, 122, 125, 142, 159
      This masks failures and makes debugging impossible.
    plan:
      - Review all instances of `_ =` assignments in error-returning functions
      - Replace with proper error handling and logging
      - Determine which errors are recoverable vs fatal
      - Log errors at appropriate severity levels (error for failures, warn for recoverable)
      - Add metrics for error rates and types
    request: scan finding
    created_at: 2025-01-18T21:30:00Z
    updated_at: 2025-01-18T21:30:00Z
  - id: 5
    status: todo
    title: Add context propagation throughout pipeline
    tags:
      - correctness
      - cancellation
      - timeout
    scope:
      - internal/scrape/scrape.go
      - internal/crawl/crawl.go
      - internal/pipeline
      - internal/jobs/manager.go
    evidence: |
      Multiple uses of context.Background() instead of propagating request context:
      scrape.go:97, 106
      crawl.go:126
      jobs/manager.go:159 (passed as context.Background() to manager.Start())
      This prevents proper timeout and cancellation handling.
    plan:
      - Pass context from jobs/manager.go through scrape.Run() and crawl.Run()
      - Replace context.Background() with propagated context in pipeline hooks
      - Add context timeout checks in long-running operations (fetch, extraction)
      - Ensure fetch operations respect context cancellation
      - Add context to database queries in store/store.go
    request: scan finding
    created_at: 2025-01-18T21:30:00Z
    updated_at: 2025-01-18T21:30:00Z
  - id: 6
    status: todo
    title: Add comprehensive input validation to API handlers
    tags:
      - security
      - validation
      - api
    scope:
      - internal/api/server.go
      - api/openapi.yaml
    evidence:
      api/server.go handlers have minimal validation beyond required fields. No URL
      validation, no timeout bounds checking, no depth/page limits enforcement. This could
      lead to abuse or crashes.
    plan:
      - Add URL validation (scheme, valid format) in handleScrape/handleCrawl/handleResearch
      - Add bounds checking for maxDepth (1-10), maxPages (1-10000), timeoutSeconds
        (5-300)
      - Add content-type validation for request bodies
      - Add request body size limits (e.g., 1MB max)
      - Validate auth profile names (alphanumeric, hyphens, underscores)
      - Update OpenAPI spec to reflect validation rules
    request: scan finding
    created_at: 2025-01-18T21:30:00Z
    updated_at: 2025-01-18T21:30:00Z
  - id: 8
    status: todo
    title: Add job cancellation support
    tags:
      - ux
      - control
      - api
    scope:
      - internal/jobs/manager.go
      - internal/store/store.go
      - internal/api/server.go
      - api/openapi.yaml
    evidence:
      No mechanism to cancel running jobs. jobs/manager.go workers check context.Done()
      but job cancellation API does not exist. Users must wait for completion or kill
      the process.
    plan:
      - Add CancelJob method to jobs/manager.go
      - Add job cancellation to database (canceled status)
      - Add DELETE /v1/jobs/{id} endpoint to api/server.go
      - Propagate cancellation to in-flight scrape/crawl operations
      - Update CLI to support job cancellation (spartan jobs cancel <id>)
    request: scan finding
    created_at: 2025-01-18T21:30:00Z
    updated_at: 2025-01-18T21:30:00Z
  - id: 9
    status: todo
    title: Fix SQL injection and add connection pooling
    tags:
      - security
      - database
      - performance
    scope:
      - internal/store/store.go
    evidence: store/store.go uses modernc.org/sqlite with SetMaxOpenConns(1) and
      SetMaxIdleConns(1), severely limiting concurrency. No prepared statements visible
      for user-controlled inputs.
    plan:
      - Increase SQLite connection limits (e.g., 25 max open, 5 idle)
      - Add prepared statements for all queries with user input
      - Add database connection health checks
      - Add connection timeout configuration
      - Consider adding connection pooling with sql.DB metrics
      - Add database WAL checkpointing logic for long-running processes
    request: scan finding
    created_at: 2025-01-18T21:30:00Z
    updated_at: 2025-01-18T21:30:00Z
