      required:
        - expression
        - language
      properties:
        expression:
          type: string
          description: JMESPath or JSONata expression to validate
        language:
          type: string
          enum: [jmespath, jsonata]
          description: Transformation language
    TransformValidateResponse:
      type: object
      description: Response containing validation result
      properties:
        valid:
          type: boolean
          description: Whether the expression is valid
        error:
          type: string
          description: Error message if expression is invalid
        message:
          type: string
          description: Human-readable validation message
    WebhookDeliveryRecord:
