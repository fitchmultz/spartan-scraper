        replayedRequest:
          $ref: '#/components/schemas/ReplayRequestInfo'
        replayedResponse:
          $ref: '#/components/schemas/ReplayResponseInfo'
        error:
          type: string
        durationMs:
          type: integer
    ReplayRequestInfo:
      type: object
      properties:
        url:
          type: string
        method:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
    ReplayResponseInfo:
