          description: Host patterns to match (e.g., "example.com", "*.example.com")
        forceEngine:
          type: string
          enum:
          - http
          - chromedp
          - playwright
          description: Force specific rendering engine
        preferHeadless:
          type: boolean
          description: Skip HTTP probe and use headless engine
        assumeJsHeavy:
          type: boolean
          description: Treat all pages as JS-heavy
        neverHeadless:
