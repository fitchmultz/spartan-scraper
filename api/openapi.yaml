        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
          description: Maximum pages to research per job
        headless:
          type: boolean
          default: false
          description: Use headless browser
        playwright:
          type: boolean
          default: false
          description: Use Playwright instead of Chromedp
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
