            $ref: '#/components/schemas/SessionCookie'
        created_at:
          type: string
          format: date-time
          description: When the session was created
        updated_at:
          type: string
          format: date-time
          description: When the session was last updated
        expires_at:
          type: string
          format: date-time
          description: Optional session expiration time
    SessionCookie:
      type: object
      description: A cookie stored in a session
      required:
        - name
        - value
      properties:
        name:
