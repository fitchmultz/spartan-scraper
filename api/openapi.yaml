  "/v1/jobs/{id}/results":
    get:
      summary: Get job results
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      - in: query
        name: format
        schema:
          type: string
          enum:
          - jsonl
          - json
          - md
          - csv
          - xlsx
          default: jsonl
        description: Output format for results (jsonl streams raw data, json converts
          to JSON array, md generates markdown report, csv generates CSV, xlsx generates
          an Excel spreadsheet)
      - in: query
        name: limit
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
        description: Maximum number of result items to return (applies only to jsonl
          format)
      - in: query
        name: offset
        schema:
          type: integer
          default: 0
          minimum: 0
        description: Number of result items to skip before returning results (applies
          only to jsonl format)
      - in: query
        name: dbConnectionString
        schema:
          type: string
        description: Database connection string (can also use SPARTAN_POSTGRES_URL,
          SPARTAN_MYSQL_URL, SPARTAN_MONGODB_URL env vars)
      - in: query
        name: dbTable
        schema:
          type: string
        description: Target table/collection name (defaults to job kind + timestamp)
      - in: query
        name: dbMode
        schema:
          type: string
          enum:
          - insert
          - upsert
          default: insert
        description: Insert mode - insert (default) or upsert (update existing)
      - in: query
        name: dbUpsertKey
        schema:
          type: string
        description: Column/field to use as unique key for upsert operations (required
          when dbMode=upsert)
      - in: query
        name: transform_expression
        schema:
          type: string
        description: JMESPath or JSONata expression to transform results before export
      - in: query
        name: transform_language
        schema:
          type: string
          enum:
          - jmespath
          - jsonata
        description: Transformation language (required if transform_expression is
          provided)
      responses:
        '200':
          description: Results in requested format
          headers:
            X-Total-Count:
              description: Total number of items available in the result set (for
                jsonl format with pagination)
              schema:
                type: integer
          content:
            application/x-ndjson:
              schema:
                type: string
            application/json:
              schema:
                type: object
            text/markdown:
              schema:
                type: string
            text/csv:
              schema:
                type: string
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Bad Request (invalid format)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
