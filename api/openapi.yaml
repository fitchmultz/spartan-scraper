    PipelineJSResponse:
      type: object
      properties:
        scripts:
          type: array
          items:
            "$ref": "#/components/schemas/JSTargetScript"
    JSTargetScript:
      type: object
      required:
      - name
      - hostPatterns
      properties:
        name:
          type: string
          description: Unique script name
        hostPatterns:
          type: array
          items:
            type: string
          description: Host patterns to match
        engine:
          type: string
          enum:
          - chromedp
          - playwright
          description: Target engine for this script
        preNav:
          type: string
          description: JavaScript to execute before navigation
        postNav:
          type: string
          description: JavaScript to execute after navigation
        selectors:
          type: array
          items:
            type: string
          description: CSS selectors to wait for
    PipelineJSInput:
      type: object
      required:
      - name
      - hostPatterns
      properties:
        name:
          type: string
          description: Unique script name
        hostPatterns:
          type: array
          items:
            type: string
          description: Host patterns to match
        engine:
          type: string
          enum:
          - chromedp
          - playwright
          description: Target engine for this script
        preNav:
          type: string
          description: JavaScript to execute before navigation
        postNav:
          type: string
          description: JavaScript to execute after navigation
        selectors:
          type: array
          items:
            type: string
          description: CSS selectors to wait for
    CaptchaConfig:
      type: object
      description: Configuration for CAPTCHA detection and solving
      properties:
        enabled:
          type: boolean
          description: Enable CAPTCHA detection
          default: false
        autoSolve:
          type: boolean
          description: Automatically solve detected CAPTCHAs
          default: false
        service:
          type: string
          description: Solving service to use
          enum:
          - 2captcha
          - anticaptcha
        apiKey:
          type: string
          description: API key for the solving service (sensitive)
        customEndpoint:
          type: string
          description: Optional custom service endpoint
        maxRetries:
          type: integer
          description: Maximum solving attempts
          default: 3
        retryDelay:
          type: integer
          description: Delay between retries in seconds
          default: 5
        timeout:
          type: integer
          description: Maximum time to wait for solution in seconds
          default: 120
        pollingInterval:
          type: integer
          description: Poll interval for solution in seconds
          default: 5
        minConfidence:
          type: number
          format: float
          description: Minimum detection confidence (0.0-1.0)
          default: 0.7
    NetworkInterceptConfig:
      type: object
      description: Configuration for network request/response interception for API
        scraping
      properties:
        enabled:
          type: boolean
          default: false
          description: Enable network interception
        urlPatterns:
          type: array
          items:
            type: string
          description: Glob patterns for URLs to intercept (e.g., "**/api/**", "*.json")
        resourceTypes:
          type: array
          items:
            type: string
            enum:
            - xhr
            - fetch
            - document
            - script
            - stylesheet
            - image
            - media
            - font
            - websocket
            - other
          description: Resource types to capture
        captureRequestBody:
          type: boolean
          default: true
          description: Whether to capture request bodies
        captureResponseBody:
          type: boolean
          default: true
          description: Whether to capture response bodies
        maxBodySize:
          type: integer
          default: 1048576
          description: Maximum bytes to capture per body (default 1MB)
        maxEntries:
          type: integer
          default: 1000
          description: Maximum number of entries to capture
    InterceptedEntry:
      type: object
      description: Captured network request/response pair
      properties:
        request:
          "$ref": "#/components/schemas/InterceptedRequest"
        response:
          "$ref": "#/components/schemas/InterceptedResponse"
        duration:
          type: integer
          description: Time between request and response in milliseconds
    InterceptedRequest:
      type: object
      description: Captured network request
      properties:
        requestId:
          type: string
          description: Unique identifier
        url:
          type: string
          description: Request URL
        method:
          type: string
          description: HTTP method
        headers:
          type: object
          additionalProperties:
            type: string
          description: Request headers
        body:
          type: string
          description: Request body (base64 if binary)
        bodySize:
          type: integer
          description: Original body size in bytes
        timestamp:
          type: string
          format: date-time
          description: When request was sent
        resourceType:
          type: string
          enum:
          - xhr
          - fetch
          - document
          - script
          - stylesheet
          - image
          - media
          - font
          - websocket
          - other
          description: Type of resource
    InterceptedResponse:
      type: object
      description: Captured network response
      properties:
        requestId:
          type: string
          description: Matches request
        status:
          type: integer
          description: HTTP status code
        statusText:
          type: string
          description: HTTP status text
        headers:
          type: object
          additionalProperties:
            type: string
          description: Response headers
        body:
          type: string
          description: Response body (base64 if binary)
        bodySize:
          type: integer
          description: Size of response body in bytes
        timestamp:
          type: string
          format: date-time
          description: When response was received
    BatchJobRequest:
      type: object
      description: A single job within a batch request
      required:
      - url
      properties:
        url:
          type: string
          format: uri
          description: URL to scrape/crawl/research
        method:
          type: string
          enum:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - HEAD
          - OPTIONS
          default: GET
          description: HTTP method for the request
        body:
          type: string
          description: Request body for POST/PUT/PATCH requests
        contentType:
          type: string
          description: Content-Type header for the request body
        headers:
          type: object
          additionalProperties:
            type: string
          description: Additional headers to include in the request
    BatchScrapeRequest:
      type: object
      description: Request to create multiple scrape jobs
      required:
      - jobs
      properties:
        jobs:
          type: array
          minItems: 1
          maxItems: 100
          items:
            "$ref": "#/components/schemas/BatchJobRequest"
          description: List of jobs to create (1-100)
        outputFormat:
          type: string
          enum:
          - jsonl
          - json
          - md
          - csv
          - xlsx
          default: jsonl
          description: Output format for results
        extractionName:
          type: string
          description: Template name for extraction (e.g., "article", "product")
        extractionMode:
          type: string
          description: Extraction mode
        headless:
          type: boolean
          default: false
          description: Use headless browser
        playwright:
          type: boolean
          default: false
          description: Use Playwright instead of Chromedp
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
          description: Request timeout in seconds
        authProfile:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          description: Named auth profile to use
        auth:
          "$ref": "#/components/schemas/AuthOptions"
        extract:
          "$ref": "#/components/schemas/ExtractOptions"
        pipeline:
          "$ref": "#/components/schemas/PipelineOptions"
        incremental:
          type: boolean
          default: false
          description: Enable incremental scraping
        webhook:
          "$ref": "#/components/schemas/WebhookConfig"
        screenshot:
          "$ref": "#/components/schemas/ScreenshotConfig"
        device:
          "$ref": "#/components/schemas/DeviceEmulation"
    BatchCrawlRequest:
      type: object
      description: Request to create multiple crawl jobs
      required:
      - jobs
      properties:
        jobs:
          type: array
          minItems: 1
          maxItems: 100
          items:
            "$ref": "#/components/schemas/BatchJobRequest"
          description: List of jobs to create (1-100)
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
          description: Maximum crawl depth
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
          description: Maximum pages to crawl per job
        headless:
          type: boolean
          default: false
          description: Use headless browser
        playwright:
          type: boolean
          default: false
          description: Use Playwright instead of Chromedp
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
          description: Request timeout in seconds
        authProfile:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          description: Named auth profile to use
        auth:
          "$ref": "#/components/schemas/AuthOptions"
        extract:
          "$ref": "#/components/schemas/ExtractOptions"
        pipeline:
          "$ref": "#/components/schemas/PipelineOptions"
        incremental:
          type: boolean
          default: false
          description: Enable incremental crawling
        sitemapURL:
          type: string
          format: uri
          description: Optional sitemap URL for seed URLs
        sitemapOnly:
          type: boolean
          default: false
          description: Only crawl sitemap URLs
        webhook:
          "$ref": "#/components/schemas/WebhookConfig"
        screenshot:
          "$ref": "#/components/schemas/ScreenshotConfig"
        device:
          "$ref": "#/components/schemas/DeviceEmulation"
    BatchResearchRequest:
      type: object
      description: Request to create multiple research jobs
      required:
      - jobs
      - query
      properties:
        jobs:
          type: array
          minItems: 1
          maxItems: 100
          items:
            "$ref": "#/components/schemas/BatchJobRequest"
          description: List of jobs to create (1-100)
        query:
          type: string
          description: Research query string
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
          description: Maximum research depth
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
          description: Maximum pages to research per job
        headless:
          type: boolean
          default: false
          description: Use headless browser
        playwright:
          type: boolean
          default: false
          description: Use Playwright instead of Chromedp
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
          description: Request timeout in seconds
        authProfile:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          description: Named auth profile to use
        auth:
          "$ref": "#/components/schemas/AuthOptions"
        extract:
          "$ref": "#/components/schemas/ExtractOptions"
        pipeline:
          "$ref": "#/components/schemas/PipelineOptions"
        webhook:
          "$ref": "#/components/schemas/WebhookConfig"
        screenshot:
          "$ref": "#/components/schemas/ScreenshotConfig"
        device:
          "$ref": "#/components/schemas/DeviceEmulation"
        agentic:
          "$ref": "#/components/schemas/ResearchAgenticConfig"
    BatchResponse:
      type: object
      description: Response after creating a batch
      required:
      - id
      - kind
      - status
      - jobCount
      - jobs
      - createdAt
      properties:
        id:
          type: string
          description: Unique batch identifier
        kind:
          type: string
          enum:
          - scrape
          - crawl
          - research
          description: Type of jobs in the batch
        status:
          type: string
          enum:
          - pending
          - processing
          - completed
          - failed
          - partial
          - canceled
          description: Current batch status
        jobCount:
          type: integer
          description: Number of jobs in the batch
        jobs:
          type: array
          items:
            "$ref": "#/components/schemas/Job"
          description: Jobs created in this batch
        createdAt:
          type: string
          format: date-time
          description: When the batch was created
    BatchJobStats:
      type: object
      description: Aggregated job statistics for a batch
      required:
      - queued
      - running
      - succeeded
      - failed
      - canceled
      properties:
        queued:
          type: integer
          description: Number of queued jobs
        running:
          type: integer
          description: Number of running jobs
        succeeded:
          type: integer
          description: Number of succeeded jobs
        failed:
          type: integer
          description: Number of failed jobs
        canceled:
          type: integer
          description: Number of canceled jobs
    BatchStatusResponse:
      type: object
      description: Detailed batch status with statistics
      required:
      - id
      - kind
      - status
      - jobCount
      - stats
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          description: Unique batch identifier
        kind:
          type: string
          enum:
          - scrape
          - crawl
          - research
          description: Type of jobs in the batch
        status:
          type: string
          enum:
          - pending
          - processing
          - completed
          - failed
          - partial
          - canceled
          description: Current batch status
        jobCount:
          type: integer
          description: Number of jobs in the batch
        stats:
          "$ref": "#/components/schemas/BatchJobStats"
        jobs:
          type: array
          items:
            "$ref": "#/components/schemas/Job"
          description: Individual jobs (included when include_jobs=true)
        createdAt:
          type: string
          format: date-time
          description: When the batch was created
        updatedAt:
          type: string
          format: date-time
          description: When the batch was last updated
    JobChain:
      type: object
      description: A named, reusable workflow definition
      required:
      - id
      - name
      - definition
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
          description: Unique chain identifier
        name:
          type: string
          description: Human-readable chain name (unique)
        description:
          type: string
          description: Optional chain description
        definition:
          "$ref": "#/components/schemas/ChainDefinition"
        createdAt:
          type: string
          format: date-time
          description: When the chain was created
        updatedAt:
          type: string
          format: date-time
          description: When the chain was last updated
    ChainDefinition:
      type: object
      description: DAG structure defining the workflow
      required:
      - nodes
      - edges
      properties:
        nodes:
          type: array
          description: Job templates in the chain
          items:
            "$ref": "#/components/schemas/ChainNode"
        edges:
          type: array
          description: Dependency relationships between nodes
          items:
            "$ref": "#/components/schemas/ChainEdge"
    ChainNode:
      type: object
      description: A job template within a chain
      required:
      - id
      - kind
      - spec
      properties:
        id:
          type: string
          description: Unique node identifier within the chain
        kind:
          type: string
          enum:
          - scrape
          - crawl
          - research
          description: Type of job
        spec:
          type: object
          description: Typed job specification template
        metadata:
          "$ref": "#/components/schemas/ChainMetadata"
    ChainEdge:
      type: object
      description: A dependency relationship between nodes (From must complete before
        To can start)
      required:
      - from
      - to
      properties:
        from:
          type: string
          description: Source node ID (dependency)
        to:
          type: string
          description: Target node ID (dependent)
    ChainMetadata:
      type: object
      description: Human-readable metadata for a chain node
      properties:
        name:
          type: string
          description: Human-readable node name
        description:
          type: string
          description: Node description
    ChainListResponse:
      type: object
      description: List of job chains
      required:
      - chains
      properties:
        chains:
          type: array
          items:
            "$ref": "#/components/schemas/JobChain"
    ChainCreateRequest:
      type: object
      description: Request to create a new chain
      required:
      - name
      - definition
      properties:
        name:
          type: string
          description: Chain name (must be unique)
        description:
          type: string
          description: Optional chain description
        definition:
          "$ref": "#/components/schemas/ChainDefinition"
    ChainSubmitRequest:
      type: object
      description: Request to submit/instantiate a chain
      properties:
        overrides:
          type: object
          description: Parameter overrides by node ID
          additionalProperties:
            type: object
    ChainSubmitResponse:
      type: object
      description: Response after submitting a chain
      required:
      - jobs
      properties:
        jobs:
          type: array
          items:
            "$ref": "#/components/schemas/Job"
    TransformPreviewRequest:
      type: object
      description: Request to preview a transformation on job results
      required:
      - jobId
      - expression
      - language
      properties:
        jobId:
          type: string
          description: Job ID to preview against
        expression:
          type: string
          description: JMESPath or JSONata expression
        language:
          type: string
          enum:
          - jmespath
          - jsonata
          description: Transformation language
        limit:
          type: integer
          default: 10
          minimum: 1
          maximum: 100
          description: Maximum number of results to transform
    TransformPreviewResponse:
      type: object
      description: Response containing transformed preview results
      properties:
        results:
          type: array
          items:
            type: object
          description: Transformed data items
        error:
          type: string
          description: Error message if transformation failed
        resultCount:
          type: integer
          description: Number of results returned
    TransformValidateRequest:
      type: object
      description: Request to validate a transformation expression
      required:
      - expression
      - language
      properties:
        expression:
          type: string
          description: JMESPath or JSONata expression to validate
        language:
          type: string
          enum:
          - jmespath
          - jsonata
          description: Transformation language
    TransformValidateResponse:
      type: object
      description: Response containing validation result
      properties:
        valid:
          type: boolean
          description: Whether the expression is valid
        error:
          type: string
          description: Error message if expression is invalid
        message:
          type: string
          description: Human-readable validation message
    WebhookDeliveryRecord:
      type: object
      description: A webhook delivery record tracking delivery attempts
      properties:
        id:
          type: string
          description: Unique delivery record identifier
        eventId:
          type: string
          description: ID of the event being delivered
        eventType:
          type: string
          description: Type of event (job.created, page.crawled, etc.)
        jobId:
          type: string
          description: ID of the job related to this event
        url:
          type: string
          description: Webhook URL that was called
        status:
          type: string
          enum:
          - pending
          - delivered
          - failed
          description: Current delivery status
        attempts:
          type: integer
          description: Number of delivery attempts made
        lastError:
          type: string
          description: Last error message if delivery failed
        createdAt:
          type: string
          format: date-time
          description: When the delivery record was created
        updatedAt:
          type: string
          format: date-time
          description: When the delivery record was last updated
        deliveredAt:
          type: string
          format: date-time
          description: When the delivery was successful (if applicable)
        responseCode:
          type: integer
          description: HTTP response code from the last attempt
    WebhookDeliveryListResponse:
      type: object
      description: Response containing a list of webhook delivery records
      properties:
        deliveries:
          type: array
          items:
            "$ref": "#/components/schemas/WebhookDeliveryRecord"
        total:
          type: integer
          description: Total number of delivery records
    DOMNode:
      type: object
      description: Simplified DOM node for visual selector builder
      properties:
        tag:
          type: string
          description: HTML tag name
        id:
          type: string
          description: Element ID attribute
        classes:
          type: array
          items:
            type: string
          description: CSS class names
        attributes:
          type: object
          additionalProperties:
            type: string
          description: Other HTML attributes
        text:
          type: string
          description: Text content (truncated)
        children:
          type: array
          items:
            "$ref": "#/components/schemas/DOMNode"
          description: Child elements
        path:
          type: string
          description: CSS path to this element
        depth:
          type: integer
          description: Depth in DOM tree
    DOMElement:
      type: object
      description: A matched DOM element in selector testing
      properties:
        tag:
          type: string
          description: HTML tag name
        text:
          type: string
          description: Text content (truncated)
        html:
          type: string
          description: Outer HTML (truncated)
        path:
          type: string
          description: CSS path to this element
    TemplatePreviewResponse:
      type: object
      description: Response from the template preview endpoint
      properties:
        url:
          type: string
          format: uri
          description: Fetched URL
        title:
          type: string
          description: Page title
        dom_tree:
          "$ref": "#/components/schemas/DOMNode"
          description: Simplified DOM tree
        fetch_time_ms:
          type: integer
          description: Time to fetch the page in milliseconds
        fetcher:
          type: string
          enum:
          - http
          - chromedp
          - playwright
          description: Fetcher engine used
    TestSelectorRequest:
      type: object
      description: Request to test a CSS selector
      required:
      - url
      - selector
      properties:
        url:
          type: string
          format: uri
          description: URL to test against
        selector:
          type: string
          description: CSS selector to test
        headless:
          type: boolean
          default: false
          description: Use headless browser
        playwright:
          type: boolean
          default: false
          description: Use Playwright instead of Chromedp
    TestSelectorResponse:
      type: object
      description: Result of selector testing
      properties:
        selector:
          type: string
          description: The tested selector
        matches:
          type: integer
          description: Number of matching elements
        elements:
          type: array
          items:
            "$ref": "#/components/schemas/DOMElement"
          description: Matching elements
        error:
          type: string
          description: Error message if selector is invalid
    TemplateDetail:
      type: object
      description: Full template details response
      properties:
        name:
          type: string
          description: Template name
        is_built_in:
          type: boolean
          description: Whether this is a built-in template
        template:
          "$ref": "#/components/schemas/Template"
          description: Template configuration
    Template:
      type: object
      description: Extraction template configuration
      properties:
        name:
          type: string
          description: Template name
        selectors:
          type: array
          items:
            "$ref": "#/components/schemas/SelectorRule"
          description: CSS selector rules
        jsonld:
          type: array
          items:
            "$ref": "#/components/schemas/JSONLDRule"
          description: JSON-LD extraction rules
        regex:
          type: array
          items:
            "$ref": "#/components/schemas/RegexRule"
          description: Regex extraction rules
        normalize:
          "$ref": "#/components/schemas/NormalizeSpec"
          description: Field normalization configuration
    SelectorRule:
      type: object
      description: CSS selector extraction rule
      properties:
        name:
          type: string
          description: Field name
        selector:
          type: string
          description: CSS selector
        attr:
          type: string
          description: Attribute to extract (or "text" for text content)
        all:
          type: boolean
          default: false
          description: Whether to extract all matches
        join:
          type: string
          description: Join string when extracting multiple values
        trim:
          type: boolean
          default: false
          description: Whether to trim whitespace
        required:
          type: boolean
          default: false
          description: Whether this field is required
    JSONLDRule:
      type: object
      description: JSON-LD extraction rule
      properties:
        name:
          type: string
          description: Field name
        type:
          type: string
          description: JSON-LD @type to match (e.g., "Article", "Product")
        path:
          type: string
          description: Dot-separated path in JSON-LD object (e.g., "author.name")
        all:
          type: boolean
          default: false
          description: Whether to extract all matches
        required:
          type: boolean
          default: false
          description: Whether this field is required
    RegexRule:
      type: object
      description: Regex extraction rule
      properties:
        name:
          type: string
          description: Field name
        pattern:
          type: string
          description: Regex pattern
        group:
          type: integer
          default: 0
          description: Capture group to extract
        all:
          type: boolean
          default: false
          description: Whether to extract all matches
        source:
          type: string
          enum:
          - text
          - html
          - url
          default: text
          description: Source to apply regex to
        required:
          type: boolean
          default: false
          description: Whether this field is required
    NormalizeSpec:
      type: object
      description: Field normalization configuration
      properties:
        titleField:
          type: string
          description: Field to use as title
        descriptionField:
          type: string
          description: Field to use as description
        textField:
          type: string
          description: Field to use as main text content
        metaFields:
          type: object
          additionalProperties:
            type: string
          description: Map of normalized keys to field names
    CreateTemplateRequest:
      type: object
      description: Request to create or update a template
      required:
      - name
      - selectors
      properties:
        name:
          type: string
          description: Template name (must be unique)
        selectors:
          type: array
          items:
            "$ref": "#/components/schemas/SelectorRule"
          description: CSS selector rules (at least one required)
        jsonld:
          type: array
          items:
            "$ref": "#/components/schemas/JSONLDRule"
          description: Optional JSON-LD extraction rules
        regex:
          type: array
          items:
            "$ref": "#/components/schemas/RegexRule"
          description: Optional regex extraction rules
        normalize:
          "$ref": "#/components/schemas/NormalizeSpec"
          description: Optional normalization configuration
