openapi: 3.0.3
info:
  title: Spartan Scraper API
  version: 0.1.0
servers:
  - url: http://localhost:8741
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/auth/profiles:
    get:
      summary: List auth profiles
      responses:
        '200':
          description: Auth profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProfilesResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/profiles/{name}:
    put:
      summary: Upsert auth profile
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthProfile'
      responses:
        '200':
          description: Auth profile saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProfile'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete auth profile
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/import:
    post:
      summary: Import auth vault
      description: |
        Import auth vault from a file in the data directory.
        The path must be a simple filename (no directory separators or path traversal).
        The file is resolved relative to the configured DATA_DIR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVaultImport'
      responses:
        '200':
          description: Imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/export:
    post:
      summary: Export auth vault
      description: |
        Export auth vault to a file in the data directory.
        The path must be a simple filename (no directory separators or path traversal).
        The file is resolved relative to the configured DATA_DIR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVaultExport'
      responses:
        '200':
          description: Exported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/templates:
    get:
      summary: List extraction templates
      description: Returns list of all available extraction templates (built-in + file-based)
      operationId: listTemplates
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      type: string
                    description: List of template names
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/crawl-states:
    get:
      summary: List crawl states
      description: Returns list of crawl states used for incremental tracking, ordered by last_scraped DESC
      operationId: listCrawlStates
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
          description: Maximum number of crawl states to return
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of crawl states to skip
      responses:
        '200':
          description: Crawl states list
          headers:
            X-Total-Count:
              description: Total number of crawl states available
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  crawlStates:
                    type: array
                    items:
                      $ref: '#/components/schemas/CrawlState'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Clear or delete crawl states
      description: |
        Deletes a specific crawl state if 'url' parameter is provided.
        Clears all crawl states if no 'url' parameter is provided.
      operationId: deleteCrawlStates
      parameters:
        - in: query
          name: url
          schema:
            type: string
          description: URL of the crawl state to delete. If omitted, all states are cleared.
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/scrape:
    post:
      summary: Scrape a single page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrapeRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/crawl:
    post:
      summary: Crawl a site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrawlRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/research:
    post:
      summary: Deep research across multiple sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResearchRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/jobs:
    get:
      summary: List jobs
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
          description: Maximum number of jobs to return
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of jobs to skip
        - in: query
          name: status
          schema:
            type: string
            enum: [queued, running, succeeded, failed, canceled]
          description: Filter jobs by status (omitted = all jobs)
      responses:
        '200':
          description: Job list
          headers:
            X-Total-Count:
              description: Total number of jobs matching the filter
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobList'
        '400':
          description: Bad Request (invalid status parameter)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/jobs/{id}:
    get:
      summary: Get a job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Cancel or delete a job
      description: |
        Cancels a queued or running job.
        With ?force=true, permanently deletes the job from the store.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: force
          schema:
            type: boolean
            default: false
          description: If true, permanently delete the job. If false, cancel active jobs.
      responses:
        '200':
          description: Operation succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/jobs/{id}/results:
    get:
      summary: Get job results
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: format
          schema:
            type: string
            enum: [jsonl, json, md, csv, xlsx]
            default: jsonl
          description: Output format for results (jsonl streams raw data, json converts to JSON array, md generates markdown report, csv generates CSV, xlsx generates Excel spreadsheet)
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
          description: Maximum number of result items to return (applies only to jsonl format)
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of result items to skip before returning results (applies only to jsonl format)
      responses:
        '200':
          description: Results in requested format
          headers:
            X-Total-Count:
              description: Total number of items available in the result set (for jsonl format with pagination)
              schema:
                type: integer
          content:
            application/x-ndjson:
              schema:
                type: string
            application/json:
              schema:
                type: object
            text/markdown:
              schema:
                type: string
            text/csv:
              schema:
                type: string
        '400':
          description: Bad Request (invalid format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/schedules:
    get:
      summary: List schedules
      responses:
        '200':
          description: Schedule list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleListResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Add a schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleRequest'
      responses:
        '200':
          description: Schedule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/schedules/{id}:
    delete:
      summary: Delete a schedule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/metrics:
    get:
      summary: Get performance metrics
      description: |
        Returns current performance metrics including request rates, success rates,
        response times, fetcher usage breakdown, and rate limiter status.
      operationId: getMetrics
      responses:
        '200':
          description: Current metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/ws:
    get:
      summary: WebSocket endpoint for real-time job updates
      description: |
        Establishes a WebSocket connection for receiving real-time job status updates.

        ## Connection
        Upgrade HTTP connection to WebSocket protocol at `ws://host:port/v1/ws`.

        ## Message Format
        All messages are JSON with the structure:
        ```json
        {
          "type": "job_status_changed",
          "timestamp": 1706563200000,
          "payload": { ... }
        }
        ```

        ## Server -> Client Messages

        ### job_created
        Sent when a new job is enqueued.
        Payload: JobEventPayload

        ### job_started
        Sent when a job begins execution.
        Payload: JobEventPayload

        ### job_status_changed
        Sent when a job transitions between states.
        Payload: JobEventPayload

        ### job_completed
        Sent when a job reaches a terminal state (succeeded, failed, canceled).
        Payload: JobEventPayload

        ### manager_status
        Sent periodically with queue depth and active job count.
        Payload: ManagerStatusPayload

        ### metrics
        Sent every 5 seconds with performance metrics.
        Payload: MetricsResponse

        ### ping
        Heartbeat ping sent every 30 seconds.
        Client should respond with a pong message.

        ## Client -> Server Messages

        ### pong
        Response to server ping for connection health.
        ```json
        {"type": "pong", "timestamp": 1706563200000, "payload": null}
        ```

        ### subscribe_jobs
        Subscribe to job lifecycle events.
        ```json
        {"type": "subscribe_jobs", "timestamp": 1706563200000, "payload": null}
        ```

        ### unsubscribe_jobs
        Unsubscribe from job lifecycle events.
        ```json
        {"type": "unsubscribe_jobs", "timestamp": 1706563200000, "payload": null}
        ```

        ## Fallback Behavior
        If the WebSocket connection fails, clients should fall back to
        polling the `/v1/jobs` endpoint every 4 seconds.
      responses:
        '101':
          description: Switching Protocols to WebSocket
        '400':
          description: Bad Request (invalid upgrade request)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ExtractOptions:
      type: object
      properties:
        template:
          type: string
          description: Template name (e.g. "article", "product")
        validate:
          type: boolean
          default: false
          description: Validate extraction against schema if present
    PipelineOptions:
      type: object
      properties:
        preProcessors:
          type: array
          items:
            type: string
        postProcessors:
          type: array
          items:
            type: string
        transformers:
          type: array
          items:
            type: string
    ResearchEvidence:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        snippet:
          type: string
        score:
          type: number
        simhash:
          type: integer
          format: uint64
        clusterId:
          type: string
        confidence:
          type: number
        citationUrl:
          type: string
    ResearchEvidenceCluster:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        confidence:
          type: number
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidence'
    ResearchCitation:
      type: object
      properties:
        url:
          type: string
        anchor:
          type: string
        canonical:
          type: string
    ResearchResult:
      type: object
      properties:
        query:
          type: string
        summary:
          type: string
        confidence:
          type: number
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidence'
        clusters:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidenceCluster'
        citations:
          type: array
          items:
            $ref: '#/components/schemas/ResearchCitation'
    HeaderKV:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
    Cookie:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
        domain:
          type: string
        path:
          type: string
    Token:
      type: object
      properties:
        kind:
          type: string
          enum: [bearer, basic, api_key]
        value:
          type: string
        header:
          type: string
        query:
          type: string
        cookie:
          type: string
    LoginFlow:
      type: object
      properties:
        url:
          type: string
        userSelector:
          type: string
        passSelector:
          type: string
        submitSelector:
          type: string
        username:
          type: string
        password:
          type: string
    TargetPreset:
      type: object
      properties:
        name:
          type: string
        hostPatterns:
          type: array
          items:
            type: string
        profile:
          type: string
        headers:
          type: array
          items:
            $ref: '#/components/schemas/HeaderKV'
        cookies:
          type: array
          items:
            $ref: '#/components/schemas/Cookie'
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/Token'
    AuthProfile:
      type: object
      properties:
        name:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        parents:
          type: array
          items:
            type: string
        headers:
          type: array
          items:
            $ref: '#/components/schemas/HeaderKV'
        cookies:
          type: array
          items:
            $ref: '#/components/schemas/Cookie'
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/Token'
        login:
          $ref: '#/components/schemas/LoginFlow'
        presets:
          type: array
          items:
            $ref: '#/components/schemas/TargetPreset'
    AuthVault:
      type: object
      properties:
        version:
          type: string
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/AuthProfile'
        presets:
          type: array
          items:
            $ref: '#/components/schemas/TargetPreset'
    AuthProfilesResponse:
      type: object
      properties:
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/AuthProfile'
    AuthVaultImport:
      type: object
      properties:
        path:
          type: string
          pattern: '^[^/\\]+$'
          description: Simple filename only (no path, no directory separators, resolved relative to DATA_DIR)
      required: [path]
    AuthVaultExport:
      type: object
      properties:
        path:
          type: string
          pattern: '^[^/\\]+$'
          description: Simple filename only (no path, no directory separators, resolved relative to DATA_DIR)
      required: [path]
    StatusResponse:
      type: object
      properties:
        status:
          type: string
    ProxyConfig:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Proxy URL (http://, https://, socks5://)
        username:
          type: string
          description: Username for proxy authentication
        password:
          type: string
          description: Password for proxy authentication
          format: password
    AuthOptions:
      type: object
      properties:
        basic:
          type: string
          description: Basic auth in user:pass form
        headers:
          type: object
          additionalProperties:
            type: string
        cookies:
          type: array
          items:
            type: string
          description: Cookie strings like "name=value"
        query:
          type: object
          additionalProperties:
            type: string
          description: Query params applied to the request URL
        loginUrl:
          type: string
        loginUserSelector:
          type: string
        loginPassSelector:
          type: string
        loginSubmitSelector:
          type: string
        loginUser:
          type: string
        loginPass:
          type: string
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
    WebhookConfig:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Webhook URL to receive job notifications
        events:
          type: array
          description: "Events to subscribe to (default: ['completed'])"
          items:
            type: string
            enum: [completed, failed, canceled, started, all]
        secret:
          type: string
          description: HMAC-SHA256 secret for signature verification
          format: password
    WebhookPayload:
      type: object
      description: Payload sent to webhook endpoints on job events
      properties:
        eventId:
          type: string
          description: Unique identifier for this event
        eventType:
          type: string
          enum: [job.created, job.started, job.completed]
          description: Type of event that triggered this webhook
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the event
        jobId:
          type: string
          description: ID of the job this event relates to
        jobKind:
          type: string
          enum: [scrape, crawl, research]
          description: Type of job
        status:
          type: string
          enum: [queued, running, succeeded, failed, canceled]
          description: Current job status
        prevStatus:
          type: string
          description: Previous job status (if applicable)
        error:
          type: string
          description: Error message if job failed
        resultPath:
          type: string
          description: Path to job results file
        completedAt:
          type: string
          format: date-time
          description: Timestamp when job completed (for completed events)
    ScrapeRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
        webhook:
          $ref: '#/components/schemas/WebhookConfig'
    CrawlRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
        sitemapURL:
          type: string
          format: uri
          description: Optional URL to a sitemap.xml file. If provided, URLs from the sitemap will be used as crawl seeds.
        sitemapOnly:
          type: boolean
          default: false
          description: If true, only crawl URLs from the sitemap, not the root URL. Requires sitemapURL to be set.
        webhook:
          $ref: '#/components/schemas/WebhookConfig'
    ResearchRequest:
      type: object
      required: [query, urls]
      properties:
        query:
          type: string
        urls:
          type: array
          items:
            type: string
            format: uri
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
        webhook:
          $ref: '#/components/schemas/WebhookConfig'
    Job:
      type: object
      required:
        - id
        - kind
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [scrape, crawl, research]
        status:
          type: string
          enum: [queued, running, succeeded, failed, canceled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        params:
          type: object
          description: Job parameters. Sensitive fields (auth, headers, cookies, tokens, passwords, secrets) are redacted.
        error:
          type: string
          description: Error message if job failed. Secrets and filesystem paths are redacted.
    JobList:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        version:
          type: string
        components:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ComponentStatus'
    ComponentStatus:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        details:
          type: object
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required:
        - error
    Schedule:
      type: object
      properties:
        id:
          type: string
          description: Unique schedule identifier
        kind:
          type: string
          enum: [scrape, crawl, research]
        intervalSeconds:
          type: integer
          minimum: 1
          description: Interval between runs in seconds
        nextRun:
          type: string
          format: date-time
          description: Next scheduled run time (RFC3339)
        params:
          type: object
          additionalProperties: true
          description: Schedule parameters
      required:
        - id
        - kind
        - intervalSeconds
        - nextRun
        - params
    ScheduleRequest:
      type: object
      required: [kind, intervalSeconds]
      properties:
        kind:
          type: string
          enum: [scrape, crawl, research]
        intervalSeconds:
          type: integer
          minimum: 1
          description: Interval between runs in seconds
        url:
          type: string
          format: uri
        query:
          type: string
        urls:
          type: array
          items:
            type: string
            format: uri
        maxDepth:
          type: integer
          minimum: 1
          maximum: 10
          default: 2
        maxPages:
          type: integer
          minimum: 1
          maximum: 10000
          default: 200
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        incremental:
          type: boolean
          default: false
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
        sitemapURL:
          type: string
          format: uri
          description: Optional URL to a sitemap.xml file. If provided, URLs from the sitemap will be used as crawl seeds.
        sitemapOnly:
          type: boolean
          default: false
          description: If true, only crawl URLs from the sitemap, not the root URL. Requires sitemapURL to be set.
    ScheduleListResponse:
      type: object
      properties:
        schedules:
          type: array
          items:
            $ref: '#/components/schemas/Schedule'
      required:
        - schedules
    CrawlState:
      type: object
      required:
        - url
        - etag
        - lastModified
        - contentHash
        - lastScraped
      properties:
        url:
          type: string
          description: URL that was crawled
        etag:
          type: string
          description: ETag header value for incremental detection
        lastModified:
          type: string
          description: Last-Modified header value
        contentHash:
          type: string
          description: Hash of content for incremental detection
        lastScraped:
          type: string
          format: date-time
          description: Timestamp of last scrape
        depth:
          type: integer
          description: Depth at which this URL was found during crawl
        jobId:
          type: string
          description: ID of the job that last scraped this URL
    WSMessage:
      type: object
      description: WebSocket message envelope
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          description: Message type
          enum: [job_created, job_started, job_status_changed, job_completed, manager_status, metrics, ping, pong, subscribe_jobs, unsubscribe_jobs]
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
        payload:
          description: Message payload (varies by type)
    WSJobEventPayload:
      type: object
      description: Payload for job-related WebSocket events
      required:
        - jobId
        - kind
        - status
        - updatedAt
      properties:
        jobId:
          type: string
        kind:
          type: string
          enum: [scrape, crawl, research]
        status:
          type: string
          enum: [queued, running, succeeded, failed, canceled]
        error:
          type: string
          description: Error message if job failed
        progress:
          $ref: '#/components/schemas/WSJobProgress'
        updatedAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
    WSJobProgress:
      type: object
      description: Progress information for crawl jobs
      properties:
        pagesCrawled:
          type: integer
        pagesTotal:
          type: integer
        depthCurrent:
          type: integer
        depthMax:
          type: integer
    WSManagerStatusPayload:
      type: object
      description: Payload for manager status updates
      required:
        - queuedJobs
        - activeJobs
      properties:
        queuedJobs:
          type: integer
          description: Number of jobs in queue
        activeJobs:
          type: integer
          description: Number of currently running jobs
    MetricsResponse:
      type: object
      description: Performance metrics and rate limiting status
      properties:
        requestsPerSec:
          type: number
          format: float
          description: Requests per second over the retention window
        successRate:
          type: number
          format: float
          description: Success rate as percentage (0-100)
        avgResponseTimeMs:
          type: number
          format: float
          description: Average response time in milliseconds
        activeRequests:
          type: integer
          description: Number of currently active requests
        totalRequests:
          type: integer
          format: int64
          description: Total number of requests since startup
        fetcherUsage:
          $ref: '#/components/schemas/FetcherUsageBreakdown'
        rateLimitStatus:
          type: array
          items:
            $ref: '#/components/schemas/RateLimitStatus'
          description: Rate limit status for all known hosts
        jobThroughputPerMin:
          type: number
          format: float
          description: Job throughput in jobs per minute
        avgJobDurationMs:
          type: number
          format: float
          description: Average job duration in milliseconds
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp when metrics were captured
    FetcherUsageBreakdown:
      type: object
      description: Usage counts per fetcher type
      properties:
        http:
          type: integer
          format: int64
          description: Number of HTTP requests
        chromedp:
          type: integer
          format: int64
          description: Number of Chromedp requests
        playwright:
          type: integer
          format: int64
          description: Number of Playwright requests
    RateLimitStatus:
      type: object
      description: Rate limit status for a single host
      properties:
        host:
          type: string
          description: Hostname (sanitized, no paths or query params)
        qps:
          type: number
          format: float
          description: Queries per second limit
        burst:
          type: integer
          description: Burst capacity
        tokens:
          type: number
          format: float
          description: Estimated current tokens available
        lastRequest:
          type: integer
          format: int64
          description: Unix timestamp of last request to this host
