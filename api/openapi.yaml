            networkIdleQuietMs:
              type: integer
            minTextLength:
              type: integer
            stabilityPollMs:
              type: integer
            stabilityIterations:
              type: integer
            extraSleepMs:
              type: integer
        timeouts:
          type: object
          properties:
            maxRenderMs:
              type: integer
