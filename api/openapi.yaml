          type: string
        url:
          type: string
        statusDiff:
          $ref: '#/components/schemas/StatusDiff'
        headerDiffs:
          type: array
          items:
            $ref: '#/components/schemas/HeaderDiff'
        bodyDiff:
          $ref: '#/components/schemas/BodyDiff'
