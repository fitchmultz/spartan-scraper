openapi: 3.0.3
info:
  title: Spartan Scraper API
  version: 0.1.0
servers:
  - url: http://localhost:8741
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/auth/profiles:
    get:
      summary: List auth profiles
      responses:
        '200':
          description: Auth profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProfilesResponse'
  /v1/auth/profiles/{name}:
    put:
      summary: Upsert auth profile
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthProfile'
      responses:
        '200':
          description: Auth profile saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProfile'
    delete:
      summary: Delete auth profile
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /v1/auth/import:
    post:
      summary: Import auth vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVaultImport'
      responses:
        '200':
          description: Imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /v1/auth/export:
    post:
      summary: Export auth vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVaultExport'
      responses:
        '200':
          description: Exported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /v1/scrape:
    post:
      summary: Scrape a single page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrapeRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
  /v1/crawl:
    post:
      summary: Crawl a site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrawlRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
  /v1/research:
    post:
      summary: Deep research across multiple sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResearchRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
  /v1/jobs:
    get:
      summary: List jobs
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobList'
  /v1/jobs/{id}:
    get:
      summary: Get a job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
    delete:
      summary: Cancel a job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /v1/jobs/{id}/results:
    get:
      summary: Get job results
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Results (JSONL)
          content:
            application/json:
              schema:
                type: string
components:
  schemas:
    ExtractOptions:
      type: object
      properties:
        template:
          type: string
          description: Template name (e.g. "article", "product")
        validate:
          type: boolean
          default: false
          description: Validate extraction against schema if present
    PipelineOptions:
      type: object
      properties:
        preProcessors:
          type: array
          items:
            type: string
        postProcessors:
          type: array
          items:
            type: string
        transformers:
          type: array
          items:
            type: string
    ResearchEvidence:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        snippet:
          type: string
        score:
          type: number
        simhash:
          type: integer
          format: uint64
        clusterId:
          type: string
        confidence:
          type: number
        citationUrl:
          type: string
    ResearchEvidenceCluster:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        confidence:
          type: number
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidence'
    ResearchCitation:
      type: object
      properties:
        url:
          type: string
        anchor:
          type: string
        canonical:
          type: string
    ResearchResult:
      type: object
      properties:
        query:
          type: string
        summary:
          type: string
        confidence:
          type: number
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidence'
        clusters:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidenceCluster'
        citations:
          type: array
          items:
            $ref: '#/components/schemas/ResearchCitation'
    HeaderKV:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
    Cookie:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
        domain:
          type: string
        path:
          type: string
    Token:
      type: object
      properties:
        kind:
          type: string
          enum: [bearer, basic, api_key]
        value:
          type: string
        header:
          type: string
        query:
          type: string
        cookie:
          type: string
    LoginFlow:
      type: object
      properties:
        url:
          type: string
        userSelector:
          type: string
        passSelector:
          type: string
        submitSelector:
          type: string
        username:
          type: string
        password:
          type: string
    TargetPreset:
      type: object
      properties:
        name:
          type: string
        hostPatterns:
          type: array
          items:
            type: string
        profile:
          type: string
        headers:
          type: array
          items:
            $ref: '#/components/schemas/HeaderKV'
        cookies:
          type: array
          items:
            $ref: '#/components/schemas/Cookie'
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/Token'
    AuthProfile:
      type: object
      properties:
        name:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        parents:
          type: array
          items:
            type: string
        headers:
          type: array
          items:
            $ref: '#/components/schemas/HeaderKV'
        cookies:
          type: array
          items:
            $ref: '#/components/schemas/Cookie'
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/Token'
        login:
          $ref: '#/components/schemas/LoginFlow'
        presets:
          type: array
          items:
            $ref: '#/components/schemas/TargetPreset'
    AuthVault:
      type: object
      properties:
        version:
          type: string
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/AuthProfile'
        presets:
          type: array
          items:
            $ref: '#/components/schemas/TargetPreset'
    AuthProfilesResponse:
      type: object
      properties:
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/AuthProfile'
    AuthVaultImport:
      type: object
      properties:
        path:
          type: string
      required: [path]
    AuthVaultExport:
      type: object
      properties:
        path:
          type: string
      required: [path]
    StatusResponse:
      type: object
      properties:
        status:
          type: string
    AuthOptions:
      type: object
      properties:
        basic:
          type: string
          description: Basic auth in user:pass form
        headers:
          type: object
          additionalProperties:
            type: string
        cookies:
          type: array
          items:
            type: string
          description: Cookie strings like "name=value"
        query:
          type: object
          additionalProperties:
            type: string
          description: Query params applied to the request URL
        loginUrl:
          type: string
        loginUserSelector:
          type: string
        loginPassSelector:
          type: string
        loginSubmitSelector:
          type: string
        loginUser:
          type: string
        loginPass:
          type: string
    ScrapeRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
    CrawlRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
    ResearchRequest:
      type: object
      required: [query, urls]
      properties:
        query:
          type: string
        urls:
          type: array
          items:
            type: string
            format: uri
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
    Job:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [scrape, crawl, research]
        status:
          type: string
          enum: [queued, running, succeeded, failed, canceled]
        createdAt:
          type: string
        updatedAt:
          type: string
        params:
          type: object
        resultPath:
          type: string
        error:
          type: string
    JobList:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        components:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ComponentStatus'
    ComponentStatus:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        details:
          type: object
