        methods:
          type: array
          items:
            type: string
          description: HTTP methods to include
        resourceTypes:
          type: array
          items:
            type: string
          description: Resource types to include (xhr, fetch, document, etc.)
        statusCodes:
          type: array
          items:
            type: integer
          description: Only replay if original had these status codes
    TrafficModifications:
      type: object
