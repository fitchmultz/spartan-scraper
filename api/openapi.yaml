          description: Template name (must be unique)
        selectors:
          type: array
          items:
            $ref: '#/components/schemas/SelectorRule'
          description: CSS selector rules (at least one required)
        jsonld:
          type: array
          items:
            $ref: '#/components/schemas/JSONLDRule'
          description: Optional JSON-LD extraction rules
        regex:
          type: array
          items:
            $ref: '#/components/schemas/RegexRule'
          description: Optional regex extraction rules
        normalize:
          $ref: '#/components/schemas/NormalizeSpec'
          description: Optional normalization configuration
    TrafficReplayRequest:
      type: object
      required:
        - jobId
        - targetBaseUrl
