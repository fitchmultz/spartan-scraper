          description: Cookie name
        value:
          type: string
          description: Cookie value
        domain:
          type: string
          description: Cookie domain
        path:
          type: string
          description: Cookie path
        expires:
          type: string
          format: date-time
          description: Cookie expiration time
        secure:
          type: boolean
          description: Whether the cookie requires HTTPS
        httpOnly:
          type: boolean
          description: Whether the cookie is HTTP-only
        sameSite:
          type: string
          enum: [Strict, Lax, None]
          description: SameSite attribute
    SessionInput:
      type: object
      description: Input for creating or updating a session
