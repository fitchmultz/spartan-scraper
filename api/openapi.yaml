components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication. Generate via CLI with `spartan auth apikey generate`.
    SessionAuth:
      type: apiKey
      in: cookie
      name: spartan_session
      description: Session cookie for web UI authentication
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
        authProvider:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PluginInfo:
      type: object
      description: Information about an installed plugin
      properties:
        name:
          type: string
          description: Plugin name
        version:
          type: string
          description: Plugin version
        description:
          type: string
          description: Plugin description
        author:
          type: string
          description: Plugin author
        hooks:
          type: array
          description: Pipeline hooks this plugin implements
          items:
            type: string
            enum: [pre_fetch, post_fetch, pre_extract, post_extract, pre_output, post_output]
        permissions:
          type: array
          description: Permissions granted to this plugin
          items:
            type: string
            enum: [network, filesystem, env]
        enabled:
          type: boolean
          description: Whether the plugin is currently enabled
        priority:
          type: integer
          description: Execution priority (lower = earlier)
        wasmSize:
          type: integer
          description: Size of the WASM binary in bytes
        config:
          type: object
          description: Plugin-specific configuration
          additionalProperties: true
      required:
        - name
        - version
        - enabled
        - priority

    PluginListResponse:
      type: object
      description: Response containing a list of plugins
      properties:
        plugins:
          type: array
          description: List of installed plugins
          items:
            $ref: '#/components/schemas/PluginInfo'
      required:
        - plugins

    PluginInstallRequest:
      type: object
      description: Request to install a plugin from a directory
      properties:
        source:
          type: string
          description: Path to the plugin directory
      required:
        - source

    PluginConfigureRequest:
      type: object
      description: Request to update plugin configuration
      properties:
        key:
          type: string
          description: Configuration key
        value:
          description: Configuration value (can be any type)
      required:
        - key
        - value
    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        isPersonal:
          type: boolean
        ownerId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    WorkspaceMember:
      type: object
      properties:
        workspaceId:
          type: string
        userId:
          type: string
        role:
          type: string
          enum: [admin, editor, viewer]
        user:
          $ref: '#/components/schemas/User'
        joinedAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        workspaces:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        name:
          type: string

    ExtractOptions:
      type: object
      properties:
        template:
          type: string
          description: Template name (e.g. "article", "product")
        validate:
          type: boolean
          default: false
          description: Validate extraction against schema if present
        ai:
          $ref: '#/components/schemas/AIExtractOptions'
    AIExtractOptions:
      type: object
      description: AI-powered extraction options
      properties:
        enabled:
          type: boolean
          description: Enable AI-powered extraction
        mode:
          type: string
          enum: [natural_language, schema_guided]
          description: AI extraction mode
        prompt:
          type: string
