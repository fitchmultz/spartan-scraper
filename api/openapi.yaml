          type: string
        domain:
          type: string
        path:
          type: string
    Token:
      type: object
      properties:
        kind:
          type: string
          enum:
          - bearer
          - basic
          - api_key
        value:
          type: string
        header:
          type: string
        query:
          type: string
        cookie:
          type: string
    LoginFlow:
      type: object
      description: Headless login flow configuration for auth profiles
      properties:
        url:
          type: string
          format: uri
          description: Login page URL
        userSelector:
          type: string
          description: CSS selector for the username or email field
        passSelector:
          type: string
          description: CSS selector for the password field
        submitSelector:
          type: string
          description: CSS selector for the submit button
        username:
          type: string
          description: Username to submit during the login flow
        password:
          type: string
          description: Password to submit during the login flow
        autoDetect:
          type: boolean
          description: Auto-detect login form fields instead of requiring selectors
        confidenceScore:
          type: number
          format: double
          description: Confidence score for auto-detected login form fields
    OAuth2Config:
      type: object
      description: OAuth 2.0 client configuration for authorization flows
      properties:
        flow_type:
          type: string
          enum:
          - authorization_code
          - client_credentials
          - device_code
          description: OAuth 2.0 flow type
        client_id:
          type: string
          description: OAuth client ID
        client_secret:
          type: string
          description: OAuth client secret (omit for public clients)
        authorize_url:
          type: string
          format: uri
          description: Authorization endpoint URL (required for authorization_code
            flow)
        token_url:
          type: string
          format: uri
          description: Token endpoint URL
        revoke_url:
          type: string
          format: uri
          description: Token revocation endpoint URL (optional)
        scopes:
          type: array
          items:
            type: string
          description: OAuth scopes to request
        use_pkce:
          type: boolean
          default: true
          description: Use PKCE for authorization code flow (required for public clients)
        redirect_uri:
          type: string
          format: uri
          description: OAuth redirect URI
        discovery_url:
          type: string
          format: uri
          description: OIDC discovery URL (.well-known/openid-configuration)
        issuer:
          type: string
          description: OIDC issuer identifier
    OAuthInitiateRequest:
      type: object
      required:
      - profile_name
      properties:
        profile_name:
          type: string
          description: Name of the profile with OAuth2 configuration
        redirect_uri:
          type: string
          format: uri
          description: Override redirect URI for this flow
    OAuthInitiateResponse:
      type: object
      properties:
        authorization_url:
          type: string
          format: uri
          description: URL to redirect user for OAuth authorization
        state:
          type: string
          description: CSRF protection state parameter
    OAuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: OAuth access token
        token_type:
          type: string
          description: Token type (e.g., Bearer)
        expires_in:
          type: integer
          description: Token lifetime in seconds
        scope:
          type: string
          description: Granted scopes
    OAuthRefreshRequest:
      type: object
      required:
      - profile_name
      properties:
        profile_name:
          type: string
          description: Name of the profile to refresh token for
    OIDCDiscoverRequest:
      type: object
      description: OIDC discovery request - provide either discovery_url or issuer
      properties:
        discovery_url:
          type: string
          format: uri
          description: Full URL to .well-known/openid-configuration
        issuer:
          type: string
          description: OIDC issuer URL (will append .well-known/openid-configuration)
    OIDCProviderMetadata:
      type: object
      description: OIDC provider metadata from discovery
      properties:
        issuer:
          type: string
          description: OIDC issuer identifier
        authorization_endpoint:
          type: string
          format: uri
          description: Authorization endpoint URL
        token_endpoint:
          type: string
          format: uri
          description: Token endpoint URL
        userinfo_endpoint:
          type: string
          format: uri
          description: UserInfo endpoint URL
        revocation_endpoint:
          type: string
          format: uri
          description: Token revocation endpoint URL
        jwks_uri:
          type: string
          format: uri
          description: JSON Web Key Set URL
        scopes_supported:
          type: array
          items:
            type: string
          description: Supported OAuth scopes
        response_types_supported:
          type: array
          items:
            type: string
          description: Supported OAuth response types
        grant_types_supported:
          type: array
          items:
            type: string
          description: Supported OAuth grant types
        code_challenge_methods_supported:
          type: array
          items:
            type: string
          description: Supported PKCE code challenge methods
    TargetPreset:
      type: object
      properties:
        name:
          type: string
        hostPatterns:
          type: array
          items:
            type: string
        profile:
          type: string
        headers:
          type: array
          items:
            "$ref": "#/components/schemas/HeaderKV"
        cookies:
          type: array
          items:
            "$ref": "#/components/schemas/Cookie"
        tokens:
          type: array
          items:
            "$ref": "#/components/schemas/Token"
    AuthProfile:
      type: object
      properties:
        name:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
        parents:
          type: array
          items:
            type: string
        headers:
          type: array
          items:
            "$ref": "#/components/schemas/HeaderKV"
        cookies:
          type: array
          items:
            "$ref": "#/components/schemas/Cookie"
        tokens:
          type: array
          items:
            "$ref": "#/components/schemas/Token"
        login:
          "$ref": "#/components/schemas/LoginFlow"
        oauth2:
          "$ref": "#/components/schemas/OAuth2Config"
        presets:
          type: array
          items:
            "$ref": "#/components/schemas/TargetPreset"
    AuthVault:
      type: object
      properties:
        version:
          type: string
        profiles:
          type: array
          items:
            "$ref": "#/components/schemas/AuthProfile"
        presets:
          type: array
          items:
            "$ref": "#/components/schemas/TargetPreset"
    AuthProfilesResponse:
      type: object
      properties:
        profiles:
          type: array
          items:
            "$ref": "#/components/schemas/AuthProfile"
    AuthVaultImport:
      type: object
      properties:
        path:
          type: string
          pattern: "^[^/\\\\]+$"
          description: Simple filename only (no path, no directory separators, resolved
            relative to DATA_DIR)
      required:
      - path
    AuthVaultExport:
      type: object
      properties:
        path:
          type: string
          pattern: "^[^/\\\\]+$"
          description: Simple filename only (no path, no directory separators, resolved
            relative to DATA_DIR)
      required:
      - path
    StatusResponse:
      type: object
      properties:
        status:
          type: string
    ProxyConfig:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Proxy URL (http://, https://, socks5://)
        username:
          type: string
          description: Username for proxy authentication
        password:
          type: string
          description: Password for proxy authentication
          format: password
    DeviceCategory:
      type: string
      enum:
      - mobile
      - tablet
      - desktop
      description: Device category classification
    Orientation:
      type: string
      enum:
      - portrait
      - landscape
      description: Device screen orientation
    DeviceEmulation:
      type: object
      description: Device emulation configuration for mobile/responsive content
      properties:
        name:
          type: string
          description: Device preset name (e.g., "iPhone 14", "Pixel 7")
        viewportWidth:
          type: integer
          description: Viewport width in pixels
        viewportHeight:
          type: integer
          description: Viewport height in pixels
        deviceScaleFactor:
          type: number
          format: float
          description: Device pixel ratio (e.g., 2.0 for Retina, 3.0 for iPhone)
        userAgent:
          type: string
          description: User agent string for the device
        isMobile:
          type: boolean
          description: Whether to emulate mobile viewport
        hasTouch:
          type: boolean
          description: Whether the device has touch capability
        category:
          "$ref": "#/components/schemas/DeviceCategory"
        orientation:
          "$ref": "#/components/schemas/Orientation"
    ScreenshotConfig:
      type: object
      description: Screenshot capture configuration for headless fetchers (chromedp,
        playwright). Ignored for HTTP fetcher.
      properties:
        enabled:
          type: boolean
          default: false
          description: Whether to capture a screenshot of the page
        fullPage:
          type: boolean
          default: false
          description: Capture full page or just viewport
        format:
          type: string
          enum:
          - png
          - jpeg
          default: png
          description: Screenshot image format
        quality:
          type: integer
          minimum: 1
          maximum: 100
          default: 80
          description: JPEG quality (1-100), ignored for PNG
        width:
          type: integer
          description: Viewport width in pixels (0 = use default)
        height:
          type: integer
          description: Viewport height in pixels (0 = use default)
        device:
          "$ref": "#/components/schemas/DeviceEmulation"
    AuthOptions:
      type: object
      properties:
        basic:
          type: string
          description: Basic auth in user:pass form
        headers:
          type: object
          additionalProperties:
            type: string
        cookies:
          type: array
          items:
            type: string
          description: Cookie strings like "name=value"
        query:
          type: object
          additionalProperties:
            type: string
          description: Query params applied to the request URL
        loginUrl:
          type: string
        loginUserSelector:
          type: string
        loginPassSelector:
          type: string
        loginSubmitSelector:
          type: string
        loginUser:
          type: string
        loginPass:
          type: string
        proxy:
          "$ref": "#/components/schemas/ProxyConfig"
    WebhookConfig:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Webhook URL to receive job notifications
        events:
          type: array
          description: 'Events to subscribe to (default: [''completed''])'
          items:
            type: string
            enum:
            - completed
            - failed
            - canceled
            - started
            - created
            - succeeded
            - content_changed
            - page_crawled
            - retry_attempted
            - export_completed
            - all
        secret:
          type: string
          description: HMAC-SHA256 secret for signature verification
          format: password
    Watch:
      type: object
      required:
      - id
      - url
      - intervalSeconds
      - enabled
      - createdAt
      properties:
        id:
          type: string
          description: Unique watch identifier (UUID)
        url:
          type: string
          format: uri
          description: URL to monitor for changes
        selector:
          type: string
          description: CSS selector for targeted monitoring (optional)
        intervalSeconds:
          type: integer
          minimum: 60
          description: Check interval in seconds (min 60)
        enabled:
          type: boolean
          default: true
          description: Whether the watch is active
        createdAt:
          type: string
          format: date-time
          description: When the watch was created
        lastCheckedAt:
          type: string
          format: date-time
          description: When the watch was last checked
        lastChangedAt:
          type: string
          format: date-time
          description: When content last changed
        changeCount:
          type: integer
          default: 0
          description: Total number of changes detected
        diffFormat:
          type: string
          enum:
          - unified
          - html-side-by-side
          - html-inline
          default: unified
          description: Diff output format
        webhookConfig:
          "$ref": "#/components/schemas/WebhookConfig"
        notifyOnChange:
          type: boolean
          default: false
          description: Whether to send webhook notifications on change
        minChangeSize:
          type: integer
          description: Ignore changes smaller than N bytes
        ignorePatterns:
          type: array
          items:
            type: string
          description: Regex patterns to ignore in content
        headless:
          type: boolean
          default: false
          description: Use headless browser for fetching
        usePlaywright:
          type: boolean
          default: false
          description: Use Playwright instead of chromedp
        extractMode:
          type: string
          enum:
          - text
          - html
          - markdown
          description: Content extraction mode
        status:
          type: string
          enum:
          - active
          - paused
          - error
          - disabled
          description: Current watch status (derived from enabled field)
        screenshotEnabled:
          type: boolean
          default: false
          description: Enable screenshot capture and visual change detection
        screenshotConfig:
          "$ref": "#/components/schemas/ScreenshotConfig"
        visualDiffThreshold:
          type: number
          format: float
          minimum: 0
          maximum: 1
          default: 0.1
          description: Visual diff threshold (0-1) for detecting changes
    WatchInput:
      type: object
      required:
      - url
      - intervalSeconds
      properties:
        url:
          type: string
          format: uri
          description: URL to monitor for changes
        selector:
          type: string
          description: CSS selector for targeted monitoring (optional)
        intervalSeconds:
          type: integer
          minimum: 60
          default: 3600
          description: Check interval in seconds (min 60)
        enabled:
          type: boolean
          default: true
          description: Whether the watch is active
        diffFormat:
          type: string
          enum:
          - unified
          - html-side-by-side
          - html-inline
          default: unified
          description: Diff output format
        webhookConfig:
          "$ref": "#/components/schemas/WebhookConfig"
        notifyOnChange:
          type: boolean
          default: false
          description: Whether to send webhook notifications on change
        minChangeSize:
          type: integer
          description: Ignore changes smaller than N bytes
        ignorePatterns:
          type: array
          items:
            type: string
          description: Regex patterns to ignore in content
        headless:
          type: boolean
          default: false
          description: Use headless browser for fetching
        usePlaywright:
          type: boolean
          default: false
          description: Use Playwright instead of chromedp
        extractMode:
          type: string
          enum:
          - text
          - html
          - markdown
          description: Content extraction mode
        screenshotEnabled:
          type: boolean
          default: false
          description: Enable screenshot capture and visual change detection
        screenshotConfig:
          "$ref": "#/components/schemas/ScreenshotConfig"
        visualDiffThreshold:
          type: number
          format: float
          minimum: 0
          maximum: 1
          default: 0.1
          description: Visual diff threshold (0-1) for detecting changes
    WatchList:
      type: object
      required:
      - watches
      properties:
        watches:
          type: array
          items:
            "$ref": "#/components/schemas/Watch"
          description: List of all watches
    WatchCheckResult:
      type: object
      required:
      - watchId
      - url
      - checkedAt
      - changed
      properties:
        watchId:
          type: string
          description: ID of the watch that was checked
        url:
          type: string
          format: uri
          description: URL that was checked
        checkedAt:
          type: string
          format: date-time
          description: When the check was performed
        changed:
          type: boolean
          description: Whether content changed
        previousHash:
          type: string
          description: Previous content hash (if available)
        currentHash:
          type: string
          description: Current content hash
        diffText:
          type: string
          description: Unified diff text (if changed and previous content existed)
        diffHtml:
          type: string
          description: HTML formatted diff (if changed and previous content existed)
        error:
          type: string
          description: Error message if check failed
        selector:
          type: string
          description: CSS selector used for extraction
        screenshotPath:
          type: string
          description: Path to captured screenshot
        previousScreenshotPath:
          type: string
          description: Path to previous screenshot for comparison
        visualDiffPath:
          type: string
          description: Path to generated visual diff image
        visualHash:
          type: string
          description: Perceptual hash of current screenshot
        previousVisualHash:
          type: string
          description: Perceptual hash of previous screenshot
        visualChanged:
          type: boolean
          description: Whether visual changes were detected
        visualSimilarity:
          type: number
          format: float
          description: Similarity score between screenshots (0-1)
    WebhookPayload:
      type: object
      description: Payload sent to webhook endpoints on job events
      properties:
        eventId:
          type: string
          description: Unique identifier for this event
        eventType:
          type: string
          enum:
          - job.created
          - job.started
          - job.completed
          - content.changed
          - page.crawled
          - retry.attempted
          - export.completed
          - visual.changed
          description: Type of event that triggered this webhook
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the event
        jobId:
          type: string
          description: ID of the job this event relates to
        jobKind:
          type: string
          enum:
          - scrape
          - crawl
          - research
          description: Type of job
        status:
          type: string
          enum:
          - queued
          - running
          - succeeded
          - failed
          - canceled
          description: Current job status
        prevStatus:
          type: string
          description: Previous job status (if applicable)
        error:
          type: string
          description: Error message if job failed
        resultPath:
          type: string
          description: Path to job results file
        completedAt:
          type: string
          format: date-time
          description: Timestamp when job completed (for completed events)
        url:
          type: string
          description: URL where content changed
        previousHash:
          type: string
          description: Previous content hash
        currentHash:
          type: string
          description: Current content hash
        diffText:
          type: string
          description: Text diff of changes
        diffHtml:
          type: string
          description: HTML diff of changes
        selector:
          type: string
          description: CSS selector for tracked element
        screenshotPath:
          type: string
          description: Path to current screenshot
        visualDiffPath:
          type: string
          description: Path to visual diff image
        visualHash:
          type: string
          description: Perceptual hash of current screenshot
        previousVisualHash:
          type: string
          description: Perceptual hash of previous screenshot
        visualSimilarity:
          type: number
          format: float
          description: Visual similarity score (0-1)
        pageUrl:
          type: string
          description: URL of crawled page
        pageStatus:
          type: integer
          description: HTTP status code of crawled page
        pageTitle:
          type: string
          description: Title of crawled page
        pageDepth:
          type: integer
          description: Crawl depth of the page
        isDuplicate:
          type: boolean
          description: Whether this page is a duplicate
        duplicateOf:
          type: string
          description: URL of original page if this is a duplicate
        crawlSeqNum:
          type: integer
          description: Sequence number in crawl order
        attemptNumber:
          type: integer
          description: Current retry attempt number
        maxAttempts:
          type: integer
          description: Maximum number of retry attempts
        retryError:
          type: string
          description: Error that triggered the retry
        fetcherType:
          type: string
          description: Type of fetcher being used
        exportFormat:
          type: string
          description: Export format (json, csv, etc.)
        exportPath:
          type: string
          description: Path to exported file
        recordCount:
          type: integer
          description: Number of records exported
        exportSize:
          type: integer
          format: int64
          description: Size of exported file in bytes
    ScrapeRequest:
      type: object
      required:
      - url
      properties:
        url:
          type: string
          format: uri
        method:
          type: string
          enum:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - HEAD
          - OPTIONS
          default: GET
          description: HTTP method to use for the request
        body:
          type: string
          description: Request body for POST/PUT/PATCH requests (use base64 for binary
            data)
        contentType:
          type: string
          description: Content-Type header for the request body (auto-detected if
            not provided)
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
        auth:
          "$ref": "#/components/schemas/AuthOptions"
        extract:
          "$ref": "#/components/schemas/ExtractOptions"
        pipeline:
          "$ref": "#/components/schemas/PipelineOptions"
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
        proxy:
          "$ref": "#/components/schemas/ProxyConfig"
        webhook:
          "$ref": "#/components/schemas/WebhookConfig"
        screenshot:
          "$ref": "#/components/schemas/ScreenshotConfig"
        device:
          "$ref": "#/components/schemas/DeviceEmulation"
        networkIntercept:
          "$ref": "#/components/schemas/NetworkInterceptConfig"
    CrawlRequest:
      type: object
      required:
      - url
      properties:
        url:
          type: string
          format: uri
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
        auth:
          "$ref": "#/components/schemas/AuthOptions"
        extract:
          "$ref": "#/components/schemas/ExtractOptions"
        pipeline:
          "$ref": "#/components/schemas/PipelineOptions"
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
        proxy:
          "$ref": "#/components/schemas/ProxyConfig"
        sitemapURL:
          type: string
          format: uri
          description: Optional URL to a sitemap.xml file. If provided, URLs from
            the sitemap will be used as crawl seeds.
        sitemapOnly:
          type: boolean
          default: false
          description: If true, only crawl URLs from the sitemap, not the root URL.
            Requires sitemapURL to be set.
        includePatterns:
          type: array
          items:
            type: string
          description: URL path patterns to include (glob syntax, e.g., /blog/**).
            If specified, only matching URLs are crawled.
        excludePatterns:
          type: array
          items:
            type: string
          description: URL path patterns to exclude (glob syntax, e.g., /admin/*).
            Excluded URLs take precedence over included ones.
        webhook:
          "$ref": "#/components/schemas/WebhookConfig"
        screenshot:
          "$ref": "#/components/schemas/ScreenshotConfig"
        device:
          "$ref": "#/components/schemas/DeviceEmulation"
        networkIntercept:
          "$ref": "#/components/schemas/NetworkInterceptConfig"
        skipDuplicates:
          type: boolean
          default: false
          description: Enable near-duplicate content detection during crawling
        simHashThreshold:
          type: integer
          default: 3
          minimum: 0
          maximum: 64
          description: Maximum Hamming distance for content to be considered a duplicate
            (within same crawl)
        crossJobDedup:
          type: boolean
          default: false
          description: Enable cross-job duplicate detection using content index
        crossJobDedupThreshold:
          type: integer
          default: 3
          minimum: 0
          maximum: 64
          description: Hamming distance threshold for cross-job duplicate detection
    ResearchRequest:
      type: object
      required:
      - query
      - urls
      properties:
        query:
          type: string
        urls:
          type: array
          items:
            type: string
            format: uri
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
        auth:
          "$ref": "#/components/schemas/AuthOptions"
        extract:
          "$ref": "#/components/schemas/ExtractOptions"
        pipeline:
          "$ref": "#/components/schemas/PipelineOptions"
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        proxy:
          "$ref": "#/components/schemas/ProxyConfig"
        webhook:
          "$ref": "#/components/schemas/WebhookConfig"
        screenshot:
          "$ref": "#/components/schemas/ScreenshotConfig"
        device:
          "$ref": "#/components/schemas/DeviceEmulation"
        networkIntercept:
          "$ref": "#/components/schemas/NetworkInterceptConfig"
        agentic:
          "$ref": "#/components/schemas/ResearchAgenticConfig"
    Job:
      type: object
      required:
      - id
      - kind
      - status
      - createdAt
      - updatedAt
      - specVersion
      - spec
      properties:
        id:
          type: string
        kind:
          type: string
          enum:
          - scrape
          - crawl
          - research
        status:
          type: string
          enum:
          - queued
          - running
          - succeeded
          - failed
          - canceled
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        specVersion:
          type: integer
          description: Persisted typed job spec version.
        spec:
          type: object
          description: Persisted typed job spec. Sensitive fields are redacted in untrusted responses.
        error:
          type: string
          description: Error message if job failed. Secrets and filesystem paths are
            redacted.
        screenshotPath:
          type: string
          description: Path to the screenshot file if screenshot capture was enabled
        interceptedData:
          type: array
          items:
            "$ref": "#/components/schemas/InterceptedEntry"
          description: Captured network activity if network interception was enabled
        dependsOn:
          type: array
          items:
            type: string
          description: List of job IDs this job depends on
        dependencyStatus:
          type: string
          enum:
          - pending
          - ready
          - failed
          description: Status of dependency resolution
        chainId:
          type: string
          description: ID of the job chain this job belongs to, if any
    JobList:
      type: object
      properties:
        jobs:
          type: array
          items:
            "$ref": "#/components/schemas/Job"
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        version:
          type: string
        components:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/ComponentStatus"
    ComponentStatus:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        details:
          type: object
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required:
      - error
    RetentionStatusResponse:
      type: object
      properties:
        enabled:
          type: boolean
          description: Whether retention is enabled
        jobRetentionDays:
          type: integer
          description: Max age for jobs in days (0 = unlimited)
        crawlStateDays:
          type: integer
          description: Max age for crawl states in days (0 = unlimited)
        maxJobs:
          type: integer
          description: Max total jobs to keep (0 = unlimited)
        maxStorageGB:
          type: integer
          description: Max storage in GB (0 = unlimited)
        totalJobs:
          type: integer
          format: int64
          description: Current total job count
        jobsEligible:
          type: integer
          format: int64
          description: Jobs eligible for cleanup
        storageUsedMB:
          type: integer
          format: int64
          description: Current storage usage in MB
      required:
      - enabled
      - jobRetentionDays
      - crawlStateDays
      - maxJobs
      - maxStorageGB
      - totalJobs
      - jobsEligible
      - storageUsedMB
    RetentionCleanupRequest:
      type: object
      properties:
        dryRun:
          type: boolean
          description: Preview only, don't delete
          default: true
        force:
          type: boolean
          description: Run cleanup even if retention is disabled
        olderThan:
          type: integer
          description: Override age threshold (days)
        kind:
          type: string
          enum:
          - scrape
          - crawl
          - research
          description: Only cleanup specific job kind
      required:
      - dryRun
    RetentionCleanupResponse:
      type: object
      properties:
        jobsDeleted:
          type: integer
          description: Number of jobs deleted
        jobsAttempted:
          type: integer
          description: Total jobs attempted to delete
        crawlStatesDeleted:
          type: integer
          format: int64
          description: Number of crawl states deleted
        spaceReclaimedMB:
          type: integer
          format: int64
          description: Space reclaimed in MB
        durationMs:
          type: integer
          format: int64
          description: Operation duration in milliseconds
        failedJobIDs:
          type: array
          items:
            type: string
          description: Jobs whose artifacts failed to delete
        errors:
          type: array
          items:
            type: string
          description: Error messages encountered
        dryRun:
          type: boolean
          description: Whether this was a dry-run
      required:
      - jobsDeleted
      - jobsAttempted
      - crawlStatesDeleted
      - spaceReclaimedMB
      - durationMs
      - dryRun
    Schedule:
      type: object
      properties:
        id:
          type: string
          description: Unique schedule identifier
        kind:
          type: string
          enum:
          - scrape
          - crawl
          - research
        intervalSeconds:
          type: integer
          minimum: 1
          description: Interval between runs in seconds
        nextRun:
          type: string
          format: date-time
          description: Next scheduled run time (RFC3339)
        specVersion:
          type: integer
          description: Persisted typed schedule spec version.
        spec:
          type: object
          description: Persisted typed schedule spec.
      required:
      - id
      - kind
      - intervalSeconds
      - nextRun
      - specVersion
      - spec
    ScheduleRequest:
      type: object
      required:
      - kind
      - intervalSeconds
      - specVersion
      - spec
      properties:
        kind:
          type: string
          enum:
          - scrape
          - crawl
          - research
        intervalSeconds:
          type: integer
          minimum: 1
          description: Interval between runs in seconds
        specVersion:
          type: integer
          description: Typed schedule spec version.
        spec:
          type: object
          description: Typed schedule spec matching the selected kind.
    ScheduleListResponse:
      type: object
      properties:
        schedules:
          type: array
          items:
            "$ref": "#/components/schemas/Schedule"
      required:
      - schedules
    CrawlState:
      type: object
      required:
      - url
      - etag
      - lastModified
      - contentHash
      - lastScraped
      properties:
        url:
          type: string
          description: URL that was crawled
        etag:
          type: string
          description: ETag header value for incremental detection
        lastModified:
          type: string
          description: Last-Modified header value
        contentHash:
          type: string
          description: Hash of content for incremental detection
        lastScraped:
          type: string
          format: date-time
          description: Timestamp of last scrape
        depth:
          type: integer
          description: Depth at which this URL was found during crawl
        jobId:
          type: string
          description: ID of the job that last scraped this URL
    DuplicateMatch:
      type: object
      description: A potential duplicate content match from another job
      required:
      - jobId
      - url
      - simhash
      - distance
      - indexedAt
      properties:
        jobId:
          type: string
          description: ID of the job that indexed this content
        url:
          type: string
          description: URL of the duplicate content
        simhash:
          type: integer
          format: uint64
          description: Simhash fingerprint of the content
        distance:
          type: integer
          description: Hamming distance from the query simhash (lower = more similar)
        indexedAt:
          type: string
          format: date-time
          description: When this content was indexed
    ContentEntry:
      type: object
      description: A single indexed content fingerprint
      required:
      - jobId
      - simhash
      - indexedAt
      properties:
        jobId:
          type: string
          description: ID of the job that indexed this content
        simhash:
          type: integer
          format: uint64
          description: Simhash fingerprint of the content
        indexedAt:
          type: string
          format: date-time
          description: When this content was indexed
    DedupStats:
      type: object
      description: Deduplication statistics
      required:
      - totalIndexed
      - uniqueUrls
      - uniqueJobs
      - duplicatePairs
      properties:
        totalIndexed:
          type: integer
          description: Total number of content fingerprints indexed
        uniqueUrls:
          type: integer
          description: Number of unique URLs indexed
        uniqueJobs:
          type: integer
          description: Number of unique jobs that have indexed content
        duplicatePairs:
          type: integer
          description: Number of URLs that appear in multiple jobs
    WSMessage:
      type: object
      description: WebSocket message envelope
      required:
      - type
      - timestamp
      - payload
      properties:
        type:
          type: string
          description: Message type
          enum:
          - job_created
          - job_started
          - job_status_changed
          - job_completed
          - manager_status
          - metrics
          - ping
          - pong
          - subscribe_jobs
          - unsubscribe_jobs
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
        payload:
          description: Message payload (varies by type)
    WSJobEventPayload:
      type: object
      description: Payload for job-related WebSocket events
      required:
      - jobId
      - kind
      - status
      - updatedAt
      properties:
        jobId:
          type: string
        kind:
          type: string
          enum:
          - scrape
          - crawl
          - research
        status:
          type: string
          enum:
          - queued
          - running
          - succeeded
          - failed
          - canceled
        error:
          type: string
          description: Error message if job failed
        progress:
          "$ref": "#/components/schemas/WSJobProgress"
        updatedAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
    WSJobProgress:
      type: object
      description: Progress information for crawl jobs
      properties:
        pagesCrawled:
          type: integer
        pagesTotal:
          type: integer
        depthCurrent:
          type: integer
        depthMax:
          type: integer
    WSManagerStatusPayload:
      type: object
      description: Payload for manager status updates
      required:
      - queuedJobs
      - activeJobs
      properties:
        queuedJobs:
          type: integer
          description: Number of jobs in queue
        activeJobs:
          type: integer
          description: Number of currently running jobs
    MetricsResponse:
      type: object
      description: Performance metrics and rate limiting status
      properties:
        requestsPerSec:
          type: number
          format: float
          description: Requests per second over the retention window
        successRate:
          type: number
          format: float
          description: Success rate as percentage (0-100)
        avgResponseTimeMs:
          type: number
          format: float
          description: Average response time in milliseconds
        activeRequests:
          type: integer
          description: Number of currently active requests
        totalRequests:
          type: integer
          format: int64
          description: Total number of requests since startup
        fetcherUsage:
          "$ref": "#/components/schemas/FetcherUsageBreakdown"
        rateLimitStatus:
          type: array
          items:
            "$ref": "#/components/schemas/RateLimitStatus"
          description: Rate limit status for all known hosts
        jobThroughputPerMin:
          type: number
          format: float
          description: Job throughput in jobs per minute
        avgJobDurationMs:
          type: number
          format: float
          description: Average job duration in milliseconds
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp when metrics were captured
    FetcherUsageBreakdown:
      type: object
      description: Usage counts per fetcher type
      properties:
        http:
          type: integer
          format: int64
          description: Number of HTTP requests
        chromedp:
          type: integer
          format: int64
          description: Number of Chromedp requests
        playwright:
          type: integer
          format: int64
          description: Number of Playwright requests
    RateLimitStatus:
      type: object
      description: Rate limit status for a single host
      properties:
        host:
          type: string
          description: Hostname (sanitized, no paths or query params)
        qps:
          type: number
          format: float
          description: Queries per second limit
        burst:
          type: integer
          description: Burst capacity
        tokens:
          type: number
          format: float
          description: Estimated current tokens available
        lastRequest:
          type: integer
          format: int64
          description: Unix timestamp of last request to this host
    RenderProfile:
      type: object
      description: Render profile configuration for matching hosts
      required:
