openapi: 3.0.3
info:
  title: Spartan Scraper API
  version: 0.1.0
servers:
  - url: http://localhost:8741
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1/auth/profiles:
    get:
      summary: List auth profiles
      responses:
        '200':
          description: Auth profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProfilesResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/profiles/{name}:
    put:
      summary: Upsert auth profile
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthProfile'
      responses:
        '200':
          description: Auth profile saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProfile'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete auth profile
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/import:
    post:
      summary: Import auth vault
      description: |
        Import auth vault from a file in the data directory.
        The path must be a simple filename (no directory separators or path traversal).
        The file is resolved relative to the configured DATA_DIR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVaultImport'
      responses:
        '200':
          description: Imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/auth/export:
    post:
      summary: Export auth vault
      description: |
        Export auth vault to a file in the data directory.
        The path must be a simple filename (no directory separators or path traversal).
        The file is resolved relative to the configured DATA_DIR.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVaultExport'
      responses:
        '200':
          description: Exported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/templates:
    get:
      summary: List extraction templates
      description: Returns list of all available extraction templates (built-in + file-based)
      operationId: listTemplates
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      type: string
                    description: List of template names
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/crawl-states:
    get:
      summary: List crawl states
      description: Returns list of crawl states used for incremental tracking, ordered by last_scraped DESC
      operationId: listCrawlStates
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
          description: Maximum number of crawl states to return
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of crawl states to skip
      responses:
        '200':
          description: Crawl states list
          headers:
            X-Total-Count:
              description: Total number of crawl states available
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  crawlStates:
                    type: array
                    items:
                      $ref: '#/components/schemas/CrawlState'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Clear or delete crawl states
      description: |
        Deletes a specific crawl state if 'url' parameter is provided.
        Clears all crawl states if no 'url' parameter is provided.
      operationId: deleteCrawlStates
      parameters:
        - in: query
          name: url
          schema:
            type: string
          description: URL of the crawl state to delete. If omitted, all states are cleared.
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/scrape:
    post:
      summary: Scrape a single page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrapeRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/crawl:
    post:
      summary: Crawl a site
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrawlRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/research:
    post:
      summary: Deep research across multiple sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResearchRequest'
      responses:
        '200':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/jobs:
    get:
      summary: List jobs
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
          description: Maximum number of jobs to return
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of jobs to skip
        - in: query
          name: status
          schema:
            type: string
            enum: [queued, running, succeeded, failed, canceled]
          description: Filter jobs by status (omitted = all jobs)
      responses:
        '200':
          description: Job list
          headers:
            X-Total-Count:
              description: Total number of jobs matching the filter
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobList'
        '400':
          description: Bad Request (invalid status parameter)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/jobs/{id}:
    get:
      summary: Get a job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Cancel or delete a job
      description: |
        Cancels a queued or running job.
        With ?force=true, permanently deletes the job from the store.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: force
          schema:
            type: boolean
            default: false
          description: If true, permanently delete the job. If false, cancel active jobs.
      responses:
        '200':
          description: Operation succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/jobs/{id}/results:
    get:
      summary: Get job results
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: format
          schema:
            type: string
            enum: [jsonl, json, md, csv]
            default: jsonl
          description: Output format for results (jsonl streams raw data, json converts to JSON array, md generates markdown report, csv generates CSV)
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
          description: Maximum number of result items to return (applies only to jsonl format)
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of result items to skip before returning results (applies only to jsonl format)
      responses:
        '200':
          description: Results in requested format
          headers:
            X-Total-Count:
              description: Total number of items available in the result set (for jsonl format with pagination)
              schema:
                type: integer
          content:
            application/x-ndjson:
              schema:
                type: string
            application/json:
              schema:
                type: object
            text/markdown:
              schema:
                type: string
            text/csv:
              schema:
                type: string
        '400':
          description: Bad Request (invalid format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/schedules:
    get:
      summary: List schedules
      responses:
        '200':
          description: Schedule list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleListResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Add a schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleRequest'
      responses:
        '200':
          description: Schedule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported Media Type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/schedules/{id}:
    delete:
      summary: Delete a schedule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method Not Allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ExtractOptions:
      type: object
      properties:
        template:
          type: string
          description: Template name (e.g. "article", "product")
        validate:
          type: boolean
          default: false
          description: Validate extraction against schema if present
    PipelineOptions:
      type: object
      properties:
        preProcessors:
          type: array
          items:
            type: string
        postProcessors:
          type: array
          items:
            type: string
        transformers:
          type: array
          items:
            type: string
    ResearchEvidence:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        snippet:
          type: string
        score:
          type: number
        simhash:
          type: integer
          format: uint64
        clusterId:
          type: string
        confidence:
          type: number
        citationUrl:
          type: string
    ResearchEvidenceCluster:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        confidence:
          type: number
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidence'
    ResearchCitation:
      type: object
      properties:
        url:
          type: string
        anchor:
          type: string
        canonical:
          type: string
    ResearchResult:
      type: object
      properties:
        query:
          type: string
        summary:
          type: string
        confidence:
          type: number
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidence'
        clusters:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidenceCluster'
        citations:
          type: array
          items:
            $ref: '#/components/schemas/ResearchCitation'
    HeaderKV:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
    Cookie:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
        domain:
          type: string
        path:
          type: string
    Token:
      type: object
      properties:
        kind:
          type: string
          enum: [bearer, basic, api_key]
        value:
          type: string
        header:
          type: string
        query:
          type: string
        cookie:
          type: string
    LoginFlow:
      type: object
      properties:
        url:
          type: string
        userSelector:
          type: string
        passSelector:
          type: string
        submitSelector:
          type: string
        username:
          type: string
        password:
          type: string
    TargetPreset:
      type: object
      properties:
        name:
          type: string
        hostPatterns:
          type: array
          items:
            type: string
        profile:
          type: string
        headers:
          type: array
          items:
            $ref: '#/components/schemas/HeaderKV'
        cookies:
          type: array
          items:
            $ref: '#/components/schemas/Cookie'
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/Token'
    AuthProfile:
      type: object
      properties:
        name:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        parents:
          type: array
          items:
            type: string
        headers:
          type: array
          items:
            $ref: '#/components/schemas/HeaderKV'
        cookies:
          type: array
          items:
            $ref: '#/components/schemas/Cookie'
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/Token'
        login:
          $ref: '#/components/schemas/LoginFlow'
        presets:
          type: array
          items:
            $ref: '#/components/schemas/TargetPreset'
    AuthVault:
      type: object
      properties:
        version:
          type: string
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/AuthProfile'
        presets:
          type: array
          items:
            $ref: '#/components/schemas/TargetPreset'
    AuthProfilesResponse:
      type: object
      properties:
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/AuthProfile'
    AuthVaultImport:
      type: object
      properties:
        path:
          type: string
          pattern: '^[^/\\]+$'
          description: Simple filename only (no path, no directory separators, resolved relative to DATA_DIR)
      required: [path]
    AuthVaultExport:
      type: object
      properties:
        path:
          type: string
          pattern: '^[^/\\]+$'
          description: Simple filename only (no path, no directory separators, resolved relative to DATA_DIR)
      required: [path]
    StatusResponse:
      type: object
      properties:
        status:
          type: string
    AuthOptions:
      type: object
      properties:
        basic:
          type: string
          description: Basic auth in user:pass form
        headers:
          type: object
          additionalProperties:
            type: string
        cookies:
          type: array
          items:
            type: string
          description: Cookie strings like "name=value"
        query:
          type: object
          additionalProperties:
            type: string
          description: Query params applied to the request URL
        loginUrl:
          type: string
        loginUserSelector:
          type: string
        loginPassSelector:
          type: string
        loginSubmitSelector:
          type: string
        loginUser:
          type: string
        loginPass:
          type: string
    ScrapeRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
    CrawlRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
    ResearchRequest:
      type: object
      required: [query, urls]
      properties:
        query:
          type: string
        urls:
          type: array
          items:
            type: string
            format: uri
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
    Job:
      type: object
      required:
        - id
        - kind
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [scrape, crawl, research]
        status:
          type: string
          enum: [queued, running, succeeded, failed, canceled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        params:
          type: object
          description: Job parameters. Sensitive fields (auth, headers, cookies, tokens, passwords, secrets) are redacted.
        error:
          type: string
          description: Error message if job failed. Secrets and filesystem paths are redacted.
    JobList:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        components:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ComponentStatus'
    ComponentStatus:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        details:
          type: object
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required:
        - error
    Schedule:
      type: object
      properties:
        id:
          type: string
          description: Unique schedule identifier
        kind:
          type: string
          enum: [scrape, crawl, research]
        intervalSeconds:
          type: integer
          minimum: 1
          description: Interval between runs in seconds
        nextRun:
          type: string
          format: date-time
          description: Next scheduled run time (RFC3339)
        params:
          type: object
          additionalProperties: true
          description: Schedule parameters
      required:
        - id
        - kind
        - intervalSeconds
        - nextRun
        - params
    ScheduleRequest:
      type: object
      required: [kind, intervalSeconds]
      properties:
        kind:
          type: string
          enum: [scrape, crawl, research]
        intervalSeconds:
          type: integer
          minimum: 1
          description: Interval between runs in seconds
        url:
          type: string
          format: uri
        query:
          type: string
        urls:
          type: array
          items:
            type: string
            format: uri
        maxDepth:
          type: integer
          minimum: 1
          maximum: 10
          default: 2
        maxPages:
          type: integer
          minimum: 1
          maximum: 10000
          default: 200
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        incremental:
          type: boolean
          default: false
    ScheduleListResponse:
      type: object
      properties:
        schedules:
          type: array
          items:
            $ref: '#/components/schemas/Schedule'
      required:
        - schedules
    CrawlState:
      type: object
      required:
        - url
        - etag
        - lastModified
        - contentHash
        - lastScraped
      properties:
        url:
          type: string
          description: URL that was crawled
        etag:
          type: string
          description: ETag header value for incremental detection
        lastModified:
          type: string
          description: Last-Modified header value
        contentHash:
          type: string
          description: Hash of content for incremental detection
        lastScraped:
          type: string
          format: date-time
          description: Timestamp of last scrape
        depth:
          type: integer
          description: Depth at which this URL was found during crawl
        jobId:
          type: string
          description: ID of the job that last scraped this URL
