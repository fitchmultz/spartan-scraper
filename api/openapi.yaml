        status:
          type: integer
        statusText:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        body:
          type: string
        bodySize:
          type: integer
    ReplayComparison:
      type: object
      properties:
        totalCompared:
          type: integer
        matches:
          type: integer
        mismatches:
          type: integer
        differences:
          type: array
          items:
            $ref: '#/components/schemas/ResponseDiff'
    ResponseDiff:
