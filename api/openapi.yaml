        jobId:
          type: string
          description: Job ID to replay traffic from
        targetBaseUrl:
          type: string
          description: Base URL to replay requests against
        filter:
          $ref: '#/components/schemas/TrafficReplayFilter'
        modifications:
          $ref: '#/components/schemas/TrafficModifications'
        compareResponses:
          type: boolean
          default: false
