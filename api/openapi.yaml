components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication. Generate via CLI with `spartan auth apikey generate`.
  schemas:
    ExtractOptions:
      type: object
      properties:
        template:
          type: string
          description: Template name (e.g. "article", "product")
        validate:
          type: boolean
          default: false
          description: Validate extraction against schema if present
    PipelineOptions:
      type: object
      properties:
        preProcessors:
          type: array
          items:
            type: string
        postProcessors:
          type: array
          items:
            type: string
        transformers:
          type: array
          items:
            type: string
        jmesPath:
          type: string
          description: JMESPath expression for data transformation
        jsonata:
          type: string
          description: JSONata expression for data transformation
        transformVars:
          type: object
          description: Variables available to transformation expressions
          additionalProperties: true
    ResearchEvidence:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        snippet:
          type: string
        score:
          type: number
        simhash:
          type: integer
          format: uint64
        clusterId:
          type: string
        confidence:
          type: number
        citationUrl:
          type: string
    ResearchEvidenceCluster:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        confidence:
          type: number
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidence'
    ResearchCitation:
      type: object
      properties:
        url:
          type: string
        anchor:
          type: string
        canonical:
          type: string
    ResearchResult:
      type: object
      properties:
        query:
          type: string
        summary:
          type: string
        confidence:
          type: number
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidence'
        clusters:
          type: array
          items:
            $ref: '#/components/schemas/ResearchEvidenceCluster'
        citations:
          type: array
          items:
            $ref: '#/components/schemas/ResearchCitation'
    HeaderKV:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
    Cookie:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
        domain:
          type: string
        path:
          type: string
    Token:
      type: object
      properties:
        kind:
          type: string
          enum: [bearer, basic, api_key]
        value:
          type: string
        header:
          type: string
        query:
          type: string
        cookie:
          type: string
    LoginFlow:
      type: object
      properties:
        url:
          type: string
        userSelector:
          type: string
        passSelector:
          type: string
        submitSelector:
          type: string
        username:
          type: string
        password:
          type: string
    OAuth2Config:
      type: object
      description: OAuth 2.0 client configuration for authorization flows
      properties:
        flow_type:
          type: string
          enum: [authorization_code, client_credentials, device_code]
          description: OAuth 2.0 flow type
        client_id:
          type: string
          description: OAuth client ID
        client_secret:
          type: string
          description: OAuth client secret (omit for public clients)
        authorize_url:
          type: string
          format: uri
          description: Authorization endpoint URL (required for authorization_code flow)
        token_url:
          type: string
          format: uri
          description: Token endpoint URL
        revoke_url:
          type: string
          format: uri
          description: Token revocation endpoint URL (optional)
        scopes:
          type: array
          items:
            type: string
          description: OAuth scopes to request
        use_pkce:
          type: boolean
          default: true
          description: Use PKCE for authorization code flow (required for public clients)
        redirect_uri:
          type: string
          format: uri
          description: OAuth redirect URI
        discovery_url:
          type: string
          format: uri
          description: OIDC discovery URL (.well-known/openid-configuration)
        issuer:
          type: string
          description: OIDC issuer identifier
    OAuthInitiateRequest:
      type: object
      required:
        - profile_name
      properties:
        profile_name:
          type: string
          description: Name of the profile with OAuth2 configuration
        redirect_uri:
          type: string
          format: uri
          description: Override redirect URI for this flow
    OAuthInitiateResponse:
      type: object
      properties:
        authorization_url:
          type: string
          format: uri
          description: URL to redirect user for OAuth authorization
        state:
          type: string
          description: CSRF protection state parameter
    OAuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
          description: OAuth access token
        token_type:
          type: string
          description: Token type (e.g., Bearer)
        expires_in:
          type: integer
          description: Token lifetime in seconds
        scope:
          type: string
          description: Granted scopes
    OAuthRefreshRequest:
      type: object
      required:
        - profile_name
      properties:
        profile_name:
          type: string
          description: Name of the profile to refresh token for
    OIDCDiscoverRequest:
      type: object
      description: OIDC discovery request - provide either discovery_url or issuer
      properties:
        discovery_url:
          type: string
          format: uri
          description: Full URL to .well-known/openid-configuration
        issuer:
          type: string
          description: OIDC issuer URL (will append .well-known/openid-configuration)
    OIDCProviderMetadata:
      type: object
      description: OIDC provider metadata from discovery
      properties:
        issuer:
          type: string
          description: OIDC issuer identifier
        authorization_endpoint:
          type: string
          format: uri
          description: Authorization endpoint URL
        token_endpoint:
          type: string
          format: uri
          description: Token endpoint URL
        userinfo_endpoint:
          type: string
          format: uri
          description: UserInfo endpoint URL
        revocation_endpoint:
          type: string
          format: uri
          description: Token revocation endpoint URL
        jwks_uri:
          type: string
          format: uri
          description: JSON Web Key Set URL
        scopes_supported:
          type: array
          items:
            type: string
          description: Supported OAuth scopes
        response_types_supported:
          type: array
          items:
            type: string
          description: Supported OAuth response types
        grant_types_supported:
          type: array
          items:
            type: string
          description: Supported OAuth grant types
        code_challenge_methods_supported:
          type: array
          items:
            type: string
          description: Supported PKCE code challenge methods
    TargetPreset:
      type: object
      properties:
        name:
          type: string
        hostPatterns:
          type: array
          items:
            type: string
        profile:
          type: string
        headers:
          type: array
          items:
            $ref: '#/components/schemas/HeaderKV'
        cookies:
          type: array
          items:
            $ref: '#/components/schemas/Cookie'
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/Token'
    AuthProfile:
      type: object
      properties:
        name:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        parents:
          type: array
          items:
            type: string
        headers:
          type: array
          items:
            $ref: '#/components/schemas/HeaderKV'
        cookies:
          type: array
          items:
            $ref: '#/components/schemas/Cookie'
        tokens:
          type: array
          items:
            $ref: '#/components/schemas/Token'
        login:
          $ref: '#/components/schemas/LoginFlow'
        oauth2:
          $ref: '#/components/schemas/OAuth2Config'
        presets:
          type: array
          items:
            $ref: '#/components/schemas/TargetPreset'
    AuthVault:
      type: object
      properties:
        version:
          type: string
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/AuthProfile'
        presets:
          type: array
          items:
            $ref: '#/components/schemas/TargetPreset'
    AuthProfilesResponse:
      type: object
      properties:
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/AuthProfile'
    AuthVaultImport:
      type: object
      properties:
        path:
          type: string
          pattern: '^[^/\\]+$'
          description: Simple filename only (no path, no directory separators, resolved relative to DATA_DIR)
      required: [path]
    AuthVaultExport:
      type: object
      properties:
        path:
          type: string
          pattern: '^[^/\\]+$'
          description: Simple filename only (no path, no directory separators, resolved relative to DATA_DIR)
      required: [path]
    StatusResponse:
      type: object
      properties:
        status:
          type: string
    ProxyConfig:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Proxy URL (http://, https://, socks5://)
        username:
          type: string
          description: Username for proxy authentication
        password:
          type: string
          description: Password for proxy authentication
          format: password
    DeviceEmulation:
      type: object
      description: Device emulation configuration for mobile/responsive content
      properties:
        name:
          type: string
          description: Device preset name (e.g., "iPhone 14", "Pixel 7")
        viewportWidth:
          type: integer
          description: Viewport width in pixels
        viewportHeight:
          type: integer
          description: Viewport height in pixels
        deviceScaleFactor:
          type: number
          format: float
          description: Device pixel ratio (e.g., 2.0 for Retina, 3.0 for iPhone)
        userAgent:
          type: string
          description: User agent string for the device
        isMobile:
          type: boolean
          description: Whether to emulate mobile viewport
        hasTouch:
          type: boolean
          description: Whether the device has touch capability
    ScreenshotConfig:
      type: object
      description: Screenshot capture configuration for headless fetchers (chromedp, playwright). Ignored for HTTP fetcher.
      properties:
        enabled:
          type: boolean
          default: false
          description: Whether to capture a screenshot of the page
        fullPage:
          type: boolean
          default: false
          description: Capture full page or just viewport
        format:
          type: string
          enum: [png, jpeg]
          default: png
          description: Screenshot image format
        quality:
          type: integer
          minimum: 1
          maximum: 100
          default: 80
          description: JPEG quality (1-100), ignored for PNG
        width:
          type: integer
          description: Viewport width in pixels (0 = use default)
        height:
          type: integer
          description: Viewport height in pixels (0 = use default)
        device:
          $ref: '#/components/schemas/DeviceEmulation'
    AuthOptions:
      type: object
      properties:
        basic:
          type: string
          description: Basic auth in user:pass form
        headers:
          type: object
          additionalProperties:
            type: string
        cookies:
          type: array
          items:
            type: string
          description: Cookie strings like "name=value"
        query:
          type: object
          additionalProperties:
            type: string
          description: Query params applied to the request URL
        loginUrl:
          type: string
        loginUserSelector:
          type: string
        loginPassSelector:
          type: string
        loginSubmitSelector:
          type: string
        loginUser:
          type: string
        loginPass:
          type: string
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
    WebhookConfig:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Webhook URL to receive job notifications
        events:
          type: array
          description: "Events to subscribe to (default: ['completed'])"
          items:
            type: string
            enum: [completed, failed, canceled, started, all]
        secret:
          type: string
          description: HMAC-SHA256 secret for signature verification
          format: password
    WebhookPayload:
      type: object
      description: Payload sent to webhook endpoints on job events
      properties:
        eventId:
          type: string
          description: Unique identifier for this event
        eventType:
          type: string
          enum: [job.created, job.started, job.completed]
          description: Type of event that triggered this webhook
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the event
        jobId:
          type: string
          description: ID of the job this event relates to
        jobKind:
          type: string
          enum: [scrape, crawl, research]
          description: Type of job
        status:
          type: string
          enum: [queued, running, succeeded, failed, canceled]
          description: Current job status
        prevStatus:
          type: string
          description: Previous job status (if applicable)
        error:
          type: string
          description: Error message if job failed
        resultPath:
          type: string
          description: Path to job results file
        completedAt:
          type: string
          format: date-time
          description: Timestamp when job completed (for completed events)
    ScrapeRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        method:
          type: string
          enum: [GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS]
          default: GET
          description: HTTP method to use for the request
        body:
          type: string
          description: Request body for POST/PUT/PATCH requests (use base64 for binary data)
        contentType:
          type: string
          description: Content-Type header for the request body (auto-detected if not provided)
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
        webhook:
          $ref: '#/components/schemas/WebhookConfig'
        screenshot:
          $ref: '#/components/schemas/ScreenshotConfig'
        device:
          $ref: '#/components/schemas/DeviceEmulation'
        networkIntercept:
          $ref: '#/components/schemas/NetworkInterceptConfig'
    CrawlRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        incremental:
          type: boolean
          default: false
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
        sitemapURL:
          type: string
          format: uri
          description: Optional URL to a sitemap.xml file. If provided, URLs from the sitemap will be used as crawl seeds.
        sitemapOnly:
          type: boolean
          default: false
          description: If true, only crawl URLs from the sitemap, not the root URL. Requires sitemapURL to be set.
        includePatterns:
          type: array
          items:
            type: string
          description: URL path patterns to include (glob syntax, e.g., /blog/**). If specified, only matching URLs are crawled.
        excludePatterns:
          type: array
          items:
            type: string
          description: URL path patterns to exclude (glob syntax, e.g., /admin/*). Excluded URLs take precedence over included ones.
        webhook:
          $ref: '#/components/schemas/WebhookConfig'
        screenshot:
          $ref: '#/components/schemas/ScreenshotConfig'
        device:
          $ref: '#/components/schemas/DeviceEmulation'
        networkIntercept:
          $ref: '#/components/schemas/NetworkInterceptConfig'
    ResearchRequest:
      type: object
      required: [query, urls]
      properties:
        query:
          type: string
        urls:
          type: array
          items:
            type: string
            format: uri
        maxDepth:
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        maxPages:
          type: integer
          default: 200
          minimum: 1
          maximum: 10000
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
        webhook:
          $ref: '#/components/schemas/WebhookConfig'
        screenshot:
          $ref: '#/components/schemas/ScreenshotConfig'
        device:
          $ref: '#/components/schemas/DeviceEmulation'
        networkIntercept:
          $ref: '#/components/schemas/NetworkInterceptConfig'
    Job:
      type: object
      required:
        - id
        - kind
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [scrape, crawl, research]
        status:
          type: string
          enum: [queued, running, succeeded, failed, canceled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        params:
          type: object
          description: Job parameters. Sensitive fields (auth, headers, cookies, tokens, passwords, secrets) are redacted.
        error:
          type: string
          description: Error message if job failed. Secrets and filesystem paths are redacted.
        screenshotPath:
          type: string
          description: Path to the screenshot file if screenshot capture was enabled
        interceptedData:
          type: array
          items:
            $ref: '#/components/schemas/InterceptedEntry'
          description: Captured network activity if network interception was enabled
        dependsOn:
          type: array
          items:
            type: string
          description: List of job IDs this job depends on
        dependencyStatus:
          type: string
          enum: [pending, ready, failed]
          description: Status of dependency resolution
        chainId:
          type: string
          description: ID of the job chain this job belongs to, if any
    JobList:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        version:
          type: string
        components:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ComponentStatus'
    ComponentStatus:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        details:
          type: object
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required:
        - error
    Schedule:
      type: object
      properties:
        id:
          type: string
          description: Unique schedule identifier
        kind:
          type: string
          enum: [scrape, crawl, research]
        intervalSeconds:
          type: integer
          minimum: 1
          description: Interval between runs in seconds
        nextRun:
          type: string
          format: date-time
          description: Next scheduled run time (RFC3339)
        params:
          type: object
          additionalProperties: true
          description: Schedule parameters
      required:
        - id
        - kind
        - intervalSeconds
        - nextRun
        - params
    ScheduleRequest:
      type: object
      required: [kind, intervalSeconds]
      properties:
        kind:
          type: string
          enum: [scrape, crawl, research]
        intervalSeconds:
          type: integer
          minimum: 1
          description: Interval between runs in seconds
        url:
          type: string
          format: uri
        query:
          type: string
        urls:
          type: array
          items:
            type: string
            format: uri
        maxDepth:
          type: integer
          minimum: 1
          maximum: 10
          default: 2
        maxPages:
          type: integer
          minimum: 1
          maximum: 10000
          default: 200
        headless:
          type: boolean
          default: false
        playwright:
          type: boolean
          default: false
        timeoutSeconds:
          type: integer
          default: 30
          minimum: 5
          maximum: 300
        authProfile:
          type: string
          pattern: '^[a-zA-Z0-9_-]+$'
        auth:
          $ref: '#/components/schemas/AuthOptions'
        extract:
          $ref: '#/components/schemas/ExtractOptions'
        pipeline:
          $ref: '#/components/schemas/PipelineOptions'
        incremental:
          type: boolean
          default: false
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
        sitemapURL:
          type: string
          format: uri
          description: Optional URL to a sitemap.xml file. If provided, URLs from the sitemap will be used as crawl seeds.
        sitemapOnly:
          type: boolean
          default: false
          description: If true, only crawl URLs from the sitemap, not the root URL. Requires sitemapURL to be set.
        screenshot:
          $ref: '#/components/schemas/ScreenshotConfig'
        device:
          $ref: '#/components/schemas/DeviceEmulation'
    ScheduleListResponse:
      type: object
      properties:
        schedules:
          type: array
          items:
            $ref: '#/components/schemas/Schedule'
      required:
        - schedules
    CrawlState:
      type: object
      required:
        - url
        - etag
        - lastModified
        - contentHash
        - lastScraped
      properties:
        url:
          type: string
          description: URL that was crawled
        etag:
          type: string
          description: ETag header value for incremental detection
        lastModified:
          type: string
          description: Last-Modified header value
        contentHash:
          type: string
          description: Hash of content for incremental detection
        lastScraped:
          type: string
          format: date-time
          description: Timestamp of last scrape
        depth:
          type: integer
          description: Depth at which this URL was found during crawl
        jobId:
          type: string
          description: ID of the job that last scraped this URL
    WSMessage:
      type: object
      description: WebSocket message envelope
      required:
        - type
        - timestamp
        - payload
      properties:
        type:
          type: string
          description: Message type
          enum: [job_created, job_started, job_status_changed, job_completed, manager_status, metrics, ping, pong, subscribe_jobs, unsubscribe_jobs]
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
        payload:
          description: Message payload (varies by type)
    WSJobEventPayload:
      type: object
      description: Payload for job-related WebSocket events
      required:
        - jobId
        - kind
        - status
        - updatedAt
      properties:
        jobId:
          type: string
        kind:
          type: string
          enum: [scrape, crawl, research]
        status:
          type: string
          enum: [queued, running, succeeded, failed, canceled]
        error:
          type: string
          description: Error message if job failed
        progress:
          $ref: '#/components/schemas/WSJobProgress'
        updatedAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
    WSJobProgress:
      type: object
      description: Progress information for crawl jobs
      properties:
        pagesCrawled:
          type: integer
        pagesTotal:
          type: integer
        depthCurrent:
          type: integer
        depthMax:
          type: integer
    WSManagerStatusPayload:
      type: object
      description: Payload for manager status updates
      required:
        - queuedJobs
        - activeJobs
      properties:
        queuedJobs:
          type: integer
          description: Number of jobs in queue
        activeJobs:
          type: integer
          description: Number of currently running jobs
    MetricsResponse:
      type: object
      description: Performance metrics and rate limiting status
      properties:
        requestsPerSec:
          type: number
          format: float
          description: Requests per second over the retention window
        successRate:
          type: number
          format: float
          description: Success rate as percentage (0-100)
        avgResponseTimeMs:
          type: number
          format: float
          description: Average response time in milliseconds
        activeRequests:
          type: integer
          description: Number of currently active requests
        totalRequests:
          type: integer
          format: int64
          description: Total number of requests since startup
        fetcherUsage:
          $ref: '#/components/schemas/FetcherUsageBreakdown'
        rateLimitStatus:
          type: array
          items:
            $ref: '#/components/schemas/RateLimitStatus'
          description: Rate limit status for all known hosts
        jobThroughputPerMin:
          type: number
          format: float
          description: Job throughput in jobs per minute
        avgJobDurationMs:
          type: number
          format: float
          description: Average job duration in milliseconds
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp when metrics were captured
    FetcherUsageBreakdown:
      type: object
      description: Usage counts per fetcher type
      properties:
        http:
          type: integer
          format: int64
          description: Number of HTTP requests
        chromedp:
          type: integer
          format: int64
          description: Number of Chromedp requests
        playwright:
          type: integer
          format: int64
          description: Number of Playwright requests
    RateLimitStatus:
      type: object
      description: Rate limit status for a single host
      properties:
        host:
          type: string
          description: Hostname (sanitized, no paths or query params)
        qps:
          type: number
          format: float
          description: Queries per second limit
        burst:
          type: integer
          description: Burst capacity
        tokens:
          type: number
          format: float
          description: Estimated current tokens available
        lastRequest:
          type: integer
          format: int64
          description: Unix timestamp of last request to this host
    RenderProfile:
      type: object
      description: Render profile configuration for matching hosts
      required:
        - name
        - hostPatterns
      properties:
        name:
          type: string
          description: Unique profile name
        hostPatterns:
          type: array
          items:
            type: string
          description: Host patterns to match (e.g., "example.com", "*.example.com")
        forceEngine:
          type: string
          enum: [http, chromedp, playwright]
          description: Force specific rendering engine
        preferHeadless:
          type: boolean
          description: Skip HTTP probe and use headless engine
        assumeJsHeavy:
          type: boolean
          description: Treat all pages as JS-heavy
        neverHeadless:
          type: boolean
          description: Never use headless rendering
        jsHeavyThreshold:
          type: number
          format: float
          description: JS heaviness threshold (0-1)
        rateLimitQPS:
          type: integer
          description: Rate limit QPS for matching hosts (0 = use global default)
        rateLimitBurst:
          type: integer
          description: Rate limit burst for matching hosts (0 = use global default)
        block:
          type: object
          properties:
            resourceTypes:
              type: array
              items:
                type: string
                enum: [image, media, font, stylesheet, other]
            urlPatterns:
              type: array
              items:
                type: string
        wait:
          type: object
          properties:
            mode:
              type: string
              enum: [dom_ready, network_idle, stability, selector]
            selector:
              type: string
            networkIdleQuietMs:
              type: integer
            minTextLength:
              type: integer
            stabilityPollMs:
              type: integer
            stabilityIterations:
              type: integer
            extraSleepMs:
              type: integer
        timeouts:
          type: object
          properties:
            maxRenderMs:
              type: integer
            scriptEvalMs:
              type: integer
            navigationMs:
              type: integer
        screenshot:
          type: object
          properties:
            enabled:
              type: boolean
            fullPage:
              type: boolean
            format:
              type: string
              enum: [png, jpeg]
            quality:
              type: integer
            width:
              type: integer
            height:
              type: integer
        device:
          type: object
          properties:
            name:
              type: string
            viewportWidth:
              type: integer
            viewportHeight:
              type: integer
            deviceScaleFactor:
              type: number
              format: float
            userAgent:
              type: string
            isMobile:
              type: boolean
            hasTouch:
              type: boolean
    NetworkInterceptConfig:
      type: object
      description: Configuration for network request/response interception for API scraping
      properties:
        enabled:
          type: boolean
          default: false
          description: Enable network interception
        urlPatterns:
          type: array
          items:
            type: string
          description: Glob patterns for URLs to intercept (e.g., "**/api/**", "*.json")
        resourceTypes:
          type: array
          items:
            type: string
            enum: [xhr, fetch, document, script, stylesheet, image, media, font, websocket, other]
          description: Resource types to capture
        captureRequestBody:
          type: boolean
          default: true
          description: Whether to capture request bodies
        captureResponseBody:
          type: boolean
          default: true
          description: Whether to capture response bodies
        maxBodySize:
          type: integer
          default: 1048576
          description: Maximum bytes to capture per body (default 1MB)
        maxEntries:
          type: integer
          default: 1000
          description: Maximum number of entries to capture
    InterceptedEntry:
      type: object
      description: Captured network request/response pair
      properties:
        request:
          $ref: '#/components/schemas/InterceptedRequest'
        response:
          $ref: '#/components/schemas/InterceptedResponse'
        duration:
          type: integer
          description: Time between request and response in milliseconds
    InterceptedRequest:
      type: object
      description: Captured network request
      properties:
        requestId:
          type: string
          description: Unique identifier
        url:
          type: string
          description: Request URL
        method:
          type: string
          description: HTTP method
        headers:
          type: object
          additionalProperties:
            type: string
          description: Request headers
        body:
          type: string
          description: Request body (base64 if binary)
        bodySize:
          type: integer
          description: Original body size in bytes
        timestamp:
          type: string
          format: date-time
          description: When request was sent
        resourceType:
          type: string
          enum: [xhr, fetch, document, script, stylesheet, image, media, font, websocket, other]
          description: Type of resource
    InterceptedResponse:
      type: object
      description: Captured network response
      properties:
        requestId:
          type: string
          description: Matches request
        status:
          type: integer
          description: HTTP status code
        statusText:
          type: string
          description: HTTP status text
        headers:
          type: object
          additionalProperties:
            type: string
          description: Response headers
        body:
          type: string
          description: Response body (base64 if binary)
        bodySize:
          type: integer
          description: Size of response body in bytes
        timestamp:
          type: string
          format: date-time
          description: When response was received
    BatchJobRequest:
      type: object
      description: A single job within a batch request
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: URL to scrape/crawl/research
        method:
          type: string
          enum: [GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS]
          default: GET
          description: HTTP method for the request
        body:
          type: string
          description: Request body for POST/PUT/PATCH requests
        contentType:
          type: string
          description: Content-Type header for the request body
        headers:
          type: object
          additionalProperties:
            type: string
          description: Additional headers to include in the request
    BatchScrapeRequest:
      type: object
      description: Request to create multiple scrape jobs
      required: [jobs]
      properties:
        jobs:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/BatchJobRequest'
