components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication. Generate via CLI with `spartan auth
        apikey generate`.
    SessionAuth:
      type: apiKey
      in: cookie
      name: spartan_session
      description: Session cookie for web UI authentication
  schemas:
    ExportSchedule:
      type: object
      required:
      - id
      - name
      - enabled
      - filters
      - export
      properties:
        id:
          type: string
          description: Unique identifier for the export schedule
        name:
          type: string
          description: Human-readable name for the schedule
        enabled:
          type: boolean
          description: Whether the schedule is active
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        filters:
          "$ref": "#/components/schemas/ExportFilters"
        export:
          "$ref": "#/components/schemas/ExportConfig"
        retry:
          "$ref": "#/components/schemas/ExportRetryConfig"
    ExportScheduleRequest:
      type: object
      required:
      - name
      - filters
      - export
      properties:
        name:
          type: string
          description: Human-readable name for the schedule
        enabled:
          type: boolean
          default: true
          description: Whether the schedule should be active
        filters:
          "$ref": "#/components/schemas/ExportFilters"
        export:
          "$ref": "#/components/schemas/ExportConfig"
        retry:
          "$ref": "#/components/schemas/ExportRetryConfig"
    ExportScheduleListResponse:
      type: object
      properties:
        schedules:
          type: array
          items:
            "$ref": "#/components/schemas/ExportSchedule"
    ExportFilters:
      type: object
      description: Filter criteria for matching jobs to export
      properties:
        job_kinds:
          type: array
          items:
            type: string
            enum:
            - scrape
            - crawl
            - research
          description: Job kinds to match (empty = all kinds)
        job_status:
          type: array
          items:
            type: string
            enum:
            - completed
            - failed
            - succeeded
            - canceled
          description: Job statuses to match (empty = completed only)
        tags:
          type: array
          items:
            type: string
          description: Tags that must all be present on the job
        has_results:
          type: boolean
          description: Only match jobs with non-empty results
    ExportConfig:
      type: object
      required:
      - format
      - destination_type
      properties:
        format:
          type: string
          enum:
          - json
          - jsonl
          - md
          - csv
          - xlsx
          description: Export format
        destination_type:
          type: string
          enum:
          - local
          - webhook
          description: Export destination type
        local_path:
          type: string
          description: Local file path template (for local destination)
        webhook_url:
          type: string
          format: uri
          description: Webhook URL (for webhook destination)
        path_template:
          type: string
          description: Path template with variables {job_id}, {timestamp}, {kind},
            {format}
    ExportRetryConfig:
      type: object
      properties:
        max_retries:
          type: integer
          default: 3
          minimum: 0
          description: Maximum number of retry attempts
        base_delay_ms:
          type: integer
          default: 1000
          minimum: 100
          description: Base retry delay in milliseconds
    ExportHistoryResponse:
      type: object
      properties:
        records:
          type: array
          items:
            "$ref": "#/components/schemas/ExportHistoryRecord"
        total:
          type: integer
          description: Total number of records
        limit:
          type: integer
          description: Limit used for query
        offset:
          type: integer
          description: Offset used for query
    ExportHistoryRecord:
      type: object
      properties:
        id:
          type: string
          description: Unique record identifier
        schedule_id:
          type: string
          description: Export schedule ID
        job_id:
          type: string
          description: Job ID that was exported
        status:
          type: string
          enum:
          - pending
          - success
          - failed
          description: Export status
        destination:
          type: string
          description: Destination where export was sent
        exported_at:
          type: string
          format: date-time
          description: When export was initiated
        completed_at:
          type: string
          format: date-time
          description: When export completed (null if pending)
        error_message:
          type: string
          description: Error message if export failed
        retry_count:
          type: integer
          description: Number of retry attempts
        export_size:
          type: integer
          description: Size of exported data in bytes
        record_count:
          type: integer
          description: Number of records exported
    ExtractOptions:
      type: object
      properties:
        template:
          type: string
          description: Template name (e.g. "article", "product")
        validate:
          type: boolean
          default: false
          description: Validate extraction against schema if present
        ai:
          "$ref": "#/components/schemas/AIExtractOptions"
    AIExtractOptions:
      type: object
      description: AI-powered extraction options
      properties:
        enabled:
          type: boolean
          description: Enable AI-powered extraction
        mode:
          type: string
          enum:
          - natural_language
          - schema_guided
          description: AI extraction mode
        prompt:
          type: string
          description: Natural language extraction prompt (for natural_language mode)
        schema:
          type: object
          description: Schema example to guide extraction (for schema_guided mode)
        fields:
          type: array
          items:
            type: string
          description: Specific fields to extract
        use_cache:
          type: boolean
          default: true
          description: Use cached results to reduce API costs
    AIExtractPreviewRequest:
      type: object
      description: Request for AI extraction preview. Provide either a URL to fetch or raw HTML directly.
      properties:
        url:
          type: string
          format: uri
          description: URL of the page to extract from (optional when html is provided)
        html:
          type: string
          description: HTML content to preview directly (optional when url is provided)
        mode:
          type: string
          enum:
          - natural_language
          - schema_guided
          description: AI extraction mode
        prompt:
          type: string
          description: Natural language extraction prompt
        schema:
          type: object
          description: Schema example to guide extraction
        fields:
          type: array
          items:
            type: string
          description: Specific fields to extract
        headless:
          type: boolean
          description: Use headless browser to fetch content
        playwright:
          type: boolean
          description: Use Playwright instead of Chromedp for headless fetching
        visual:
          type: boolean
          description: Capture a screenshot and include visual context when fetching the URL
    AIExtractPreviewResponse:
      type: object
      description: Response from AI extraction preview
      properties:
        fields:
          type: object
          description: Extracted fields with their values and sources
          additionalProperties:
            "$ref": "#/components/schemas/FieldValue"
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Overall confidence score (0.0-1.0)
        explanation:
          type: string
          description: Explanation of what was extracted
        tokens_used:
          type: integer
          description: Number of tokens consumed by the LLM
        route_id:
          type: string
          description: Exact pi route ID selected to handle the request
        provider:
          type: string
          description: Provider selected by the pi route that handled the request
        model:
          type: string
          description: Model selected by the pi route that handled the request
        cached:
          type: boolean
          description: Whether the result was served from cache
        visual_context_used:
          type: boolean
          description: Whether screenshot-based visual context was included in the AI request
    FieldValue:
      type: object
      description: A field value with source information
      properties:
        values:
          type: array
          items:
            type: string
          description: The extracted values
        source:
          type: string
          enum:
          - selector
          - jsonld
          - regex
          - derived
          - llm
          description: Source of the extraction
        rawObject:
          type: string
          description: JSON-encoded object for complex nested values
    AIExtractTemplateGenerateRequest:
      type: object
      description: Request for AI template generation. Provide either a URL to fetch or raw HTML directly.
      required:
      - description
      properties:
        url:
          type: string
          format: uri
          description: URL to analyze for template generation (optional when html is provided)
        html:
          type: string
          description: HTML content to generate from directly (optional when url is provided)
        description:
          type: string
          description: Description of what data to extract
        sample_fields:
          type: array
          items:
            type: string
          description: Example fields that should be extracted
        headless:
          type: boolean
          description: Use headless browser to fetch content
        playwright:
          type: boolean
          description: Use Playwright instead of Chromedp for headless fetching
        visual:
          type: boolean
          description: Capture a screenshot and include visual context when fetching the URL
    AIExtractTemplateGenerateResponse:
      type: object
      description: Response from AI template generation
      properties:
        template:
          "$ref": "#/components/schemas/TemplateDetail"
        explanation:
          type: string
          description: Explanation of the generated template
        route_id:
          type: string
          description: Exact pi route ID selected to handle the request
        provider:
          type: string
          description: Provider selected by the pi route that handled the request
        model:
          type: string
          description: Model selected by the pi route that handled the request
        visual_context_used:
          type: boolean
          description: Whether screenshot-based visual context was included in the AI request
    AIExtractTemplateDebugRequest:
      type: object
      description: Request for AI template debugging. Provide either a URL to fetch or raw HTML directly.
      required:
      - template
      properties:
        url:
          type: string
          format: uri
          description: URL to analyze for template debugging (optional when html is provided)
        html:
          type: string
          description: HTML content to debug directly (optional when url is provided)
        template:
          "$ref": "#/components/schemas/Template"
        instructions:
          type: string
          description: Optional operator guidance for the repair suggestion
        headless:
          type: boolean
          description: Use headless browser to fetch content
        playwright:
          type: boolean
          description: Use Playwright instead of Chromedp for headless fetching
        visual:
          type: boolean
          description: Capture a screenshot and include visual context when fetching the URL
    AIExtractTemplateDebugResponse:
      type: object
