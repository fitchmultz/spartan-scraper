        template_name:
          type: string
          description: Template name
        extractions_total:
          type: integer
          description: Total number of extractions
        extractions_success:
          type: integer
          description: Number of successful extractions
        field_coverage_avg:
          type: number
          description: Average field coverage (0-1)
        avg_extraction_time_ms:
          type: number
          description: Average extraction time in milliseconds
    TemplateABTest:
      type: object
      description: A/B test configuration for comparing templates
      properties:
        id:
          type: string
          description: Unique test identifier
        name:
          type: string
          description: Test name
        description:
          type: string
          description: Test description
        baseline_template:
          type: string
          description: Baseline template name
        variant_template:
          type: string
          description: Variant template name
        allocation:
          type: object
          additionalProperties:
            type: integer
          description: "Traffic allocation percentages (e.g., baseline: 50, variant: 50)"
        start_time:
          type: string
          format: date-time
          description: Test start time
        end_time:
          type: string
          format: date-time
          description: Test end time (if completed)
        status:
          type: string
          enum: [pending, running, paused, completed]
          description: Current test status
        success_criteria:
          $ref: '#/components/schemas/SuccessCriteria'
        min_sample_size:
          type: integer
          description: Minimum samples per variant for significance
        confidence_level:
          type: number
          description: Statistical confidence level (e.g., 0.95)
        winner:
          type: string
          nullable: true
          enum: [baseline, variant, null]
          description: Winning template if test is complete
        created_at:
          type: string
          format: date-time
          description: When the test was created
        updated_at:
          type: string
          format: date-time
          description: When the test was last updated
    SuccessCriteria:
      type: object
      description: Criteria for determining A/B test success
      properties:
        metric:
          type: string
          enum: [success_rate, field_coverage, combined]
          description: Metric to compare
        min_improvement:
          type: number
          description: Minimum improvement required (e.g., 0.05 for 5%)
        required_fields:
          type: array
          items:
            type: string
          description: Fields that must be present for success
        min_field_coverage:
          type: number
          description: Minimum field coverage required (0-1)
    TemplateComparison:
      type: object
      description: Statistical comparison of two templates
      properties:
        test_id:
          type: string
          description: A/B test ID if part of a test
        baseline_template:
          type: string
          description: Baseline template name
        variant_template:
          type: string
          description: Variant template name
        baseline_metrics:
          $ref: '#/components/schemas/ComparisonMetrics'
        variant_metrics:
          $ref: '#/components/schemas/ComparisonMetrics'
        statistical_test:
          $ref: '#/components/schemas/StatisticalResult'
        winner:
          type: string
          nullable: true
          enum: [baseline, variant, null]
          description: Winning template if significant
        recommendation:
          type: string
          description: Human-readable recommendation
        generated_at:
          type: string
          format: date-time
          description: When the comparison was generated
    ComparisonMetrics:
      type: object
      description: Aggregated metrics for template comparison
      properties:
        sample_size:
          type: integer
          description: Number of samples
        success_rate:
          type: number
          description: Success rate as percentage (0-100)
        field_coverage:
          type: number
          description: Average field coverage (0-1)
        avg_extraction_time_ms:
          type: integer
          description: Average extraction time in milliseconds
    StatisticalResult:
      type: object
      description: Statistical significance test result
      properties:
        test_type:
          type: string
          enum: [chi_square, t_test]
          description: Type of statistical test performed
        p_value:
          type: number
          description: P-value from the test
        is_significant:
          type: boolean
          description: Whether the result is statistically significant
        confidence_interval:
          type: array
          items:
            type: number
          minItems: 2
          maxItems: 2
          description: Confidence interval [lower, upper]
        effect_size:
          type: number
          description: Effect size (Cohen's d or odds ratio)
    DOMNode:
