    BatchResponse:
      type: object
      description: Response after creating a batch
      required: [id, kind, status, jobCount, jobs, createdAt]
      properties:
        id:
          type: string
          description: Unique batch identifier
        kind:
          type: string
          enum: [scrape, crawl, research]
          description: Type of jobs in the batch
        status:
          type: string
          enum: [pending, processing, completed, failed, partial, canceled]
          description: Current batch status
        jobCount:
          type: integer
          description: Number of jobs in the batch
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
          description: Jobs created in this batch
        createdAt:
          type: string
          format: date-time
          description: When the batch was created
    BatchJobStats:
      type: object
      description: Aggregated job statistics for a batch
      required: [queued, running, succeeded, failed, canceled]
      properties:
        queued:
          type: integer
          description: Number of queued jobs
        running:
          type: integer
          description: Number of running jobs
        succeeded:
          type: integer
          description: Number of succeeded jobs
        failed:
          type: integer
          description: Number of failed jobs
        canceled:
          type: integer
          description: Number of canceled jobs
    BatchStatusResponse:
      type: object
      description: Detailed batch status with statistics
      required: [id, kind, status, jobCount, stats, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: Unique batch identifier
        kind:
          type: string
          enum: [scrape, crawl, research]
          description: Type of jobs in the batch
        status:
          type: string
          enum: [pending, processing, completed, failed, partial, canceled]
          description: Current batch status
        jobCount:
          type: integer
          description: Number of jobs in the batch
        stats:
          $ref: '#/components/schemas/BatchJobStats'
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
          description: Individual jobs (included when include_jobs=true)
        createdAt:
          type: string
          format: date-time
          description: When the batch was created
        updatedAt:
          type: string
          format: date-time
          description: When the batch was last updated
    JobChain:
      type: object
      description: A named, reusable workflow definition
      required: [id, name, definition, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: Unique chain identifier
        name:
          type: string
          description: Human-readable chain name (unique)
        description:
          type: string
          description: Optional chain description
        definition:
          $ref: '#/components/schemas/ChainDefinition'
        createdAt:
          type: string
          format: date-time
          description: When the chain was created
        updatedAt:
          type: string
          format: date-time
          description: When the chain was last updated
    ChainDefinition:
      type: object
      description: DAG structure defining the workflow
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          description: Job templates in the chain
          items:
            $ref: '#/components/schemas/ChainNode'
        edges:
          type: array
          description: Dependency relationships between nodes
          items:
            $ref: '#/components/schemas/ChainEdge'
    ChainNode:
      type: object
      description: A job template within a chain
      required: [id, kind, params]
      properties:
        id:
          type: string
          description: Unique node identifier within the chain
        kind:
          type: string
          enum: [scrape, crawl, research]
          description: Type of job
        params:
          type: object
          description: Job parameters template
        metadata:
          $ref: '#/components/schemas/ChainMetadata'
    ChainEdge:
      type: object
      description: A dependency relationship between nodes (From must complete before To can start)
      required: [from, to]
      properties:
        from:
          type: string
          description: Source node ID (dependency)
        to:
          type: string
          description: Target node ID (dependent)
    ChainMetadata:
      type: object
      description: Human-readable metadata for a chain node
      properties:
        name:
          type: string
          description: Human-readable node name
        description:
          type: string
          description: Node description
    ChainListResponse:
      type: object
      description: List of job chains
      required: [chains]
      properties:
        chains:
          type: array
          items:
            $ref: '#/components/schemas/JobChain'
    ChainCreateRequest:
      type: object
      description: Request to create a new chain
      required: [name, definition]
      properties:
        name:
          type: string
          description: Chain name (must be unique)
        description:
          type: string
          description: Optional chain description
        definition:
          $ref: '#/components/schemas/ChainDefinition'
    ChainSubmitRequest:
      type: object
      description: Request to submit/instantiate a chain
      properties:
        overrides:
          type: object
          description: Parameter overrides by node ID
          additionalProperties:
            type: object
    ChainSubmitResponse:
      type: object
      description: Response after submitting a chain
      required: [jobs]
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
    Session:
      type: object
      description: A persisted cookie session for authenticated scraping
      required:
        - id
        - domain
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique session identifier
        name:
          type: string
          description: Human-readable session name
        domain:
          type: string
          description: Domain this session is for (e.g., "example.com")
        cookies:
          type: array
          description: Persisted cookies for this session
          items:
            $ref: '#/components/schemas/SessionCookie'
        created_at:
          type: string
          format: date-time
          description: When the session was created
        updated_at:
          type: string
          format: date-time
          description: When the session was last updated
        expires_at:
          type: string
          format: date-time
          description: Optional session expiration time
    SessionCookie:
      type: object
      description: A cookie stored in a session
      required:
        - name
        - value
      properties:
        name:
          type: string
          description: Cookie name
        value:
          type: string
          description: Cookie value
        domain:
          type: string
          description: Cookie domain
        path:
          type: string
          description: Cookie path
        expires:
          type: string
          format: date-time
          description: Cookie expiration time
        secure:
          type: boolean
          description: Whether the cookie requires HTTPS
        httpOnly:
          type: boolean
          description: Whether the cookie is HTTP-only
        sameSite:
          type: string
          enum: [Strict, Lax, None]
          description: SameSite attribute
    SessionInput:
      type: object
      description: Input for creating or updating a session
      required:
        - id
        - domain
      properties:
        id:
          type: string
          description: Unique session identifier
        name:
          type: string
          description: Human-readable session name (defaults to id)
        domain:
          type: string
          description: Domain this session is for
        cookies:
          type: array
          description: Cookies to store in the session
          items:
            $ref: '#/components/schemas/SessionCookie'
    SessionResponse:
      type: object
      description: Response containing a single session
      properties:
        session:
          $ref: '#/components/schemas/Session'
    SessionsResponse:
      type: object
      description: Response containing a list of sessions
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
    TransformPreviewRequest:
      type: object
      description: Request to preview a transformation on job results
      required:
        - jobId
        - expression
        - language
      properties:
        jobId:
          type: string
          description: Job ID to preview against
        expression:
          type: string
          description: JMESPath or JSONata expression
        language:
          type: string
          enum: [jmespath, jsonata]
          description: Transformation language
        limit:
          type: integer
          default: 10
          minimum: 1
          maximum: 100
          description: Maximum number of results to transform
    TransformPreviewResponse:
      type: object
      description: Response containing transformed preview results
      properties:
        results:
          type: array
          items:
            type: object
          description: Transformed data items
        error:
          type: string
          description: Error message if transformation failed
        resultCount:
          type: integer
          description: Number of results returned
    TransformValidateRequest:
      type: object
      description: Request to validate a transformation expression
      required:
        - expression
        - language
      properties:
        expression:
          type: string
          description: JMESPath or JSONata expression to validate
        language:
          type: string
          enum: [jmespath, jsonata]
          description: Transformation language
    TransformValidateResponse:
      type: object
      description: Response containing validation result
      properties:
        valid:
          type: boolean
          description: Whether the expression is valid
        error:
          type: string
          description: Error message if expression is invalid
        message:
          type: string
          description: Human-readable validation message
